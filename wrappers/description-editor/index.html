                // remove the first child, which is the oldest
                listElement.removeChild( listElement.firstChild );
              }

              if ( responseCategory === 'context' ) {
                addEditableContextResponse( alertText );
              }

            }
          }
        } );
      } );

      liveObserver.observe( originalElement, mutationConfig );
    }

    /**
     * Adds a logged context response to the editable Context Responses list so its wording can be edited and
     * round-tripped back to the strings YAML (see renderContextResponseItem).
     *
     * @param {string} responseText - the spoken context-response text
     */
    function addEditableContextResponse( responseText ) {
      if ( !designState.designModeEnabled ) {
        return;
      }
      renderContextResponseItem( responseText );
    }

    /**
     * Renders one editable context-response item in the Context Responses list. In Design Mode the text is editable;
     * committing an edit (Enter or blur) resolves it back to its source message in the strings YAML, exactly like
     * edits in the formatted state-description view.
     *
     * @param {string} responseText
     */
    function renderContextResponseItem( responseText ) {
      const list = domReferences.responseDesignList;
      if ( !list ) {
        return;
      }

      const item = document.createElement( 'div' );
      item.className = 'response-design-item';

      const editable = document.createElement( 'span' );
      editable.className = 'response-design-editable';
      editable.contentEditable = designState.designModeEnabled ? 'true' : 'false';
      editable.textContent = responseText;
      editable.dataset.baselineText = responseText;

      // Commit on Enter or blur; Escape reverts to the baseline. Same provenance round-trip as the formatted view.
      editable.addEventListener( 'keydown', event => {
        if ( !editorState.connected || !designState.designModeEnabled ) {
          return;
        }
        if ( event.key === 'Enter' ) {
          event.preventDefault();
          editable.blur();
        }
        else if ( event.key === 'Escape' ) {
          event.preventDefault();
          editable.textContent = editable.dataset.baselineText || '';
          editable.blur();
        }
      } );
      editable.addEventListener( 'blur', () => commitContextResponseEdit( editable ) );
      item.appendChild( editable );

      list.appendChild( item );
    }

    /**
     * Removes all alerts from the activity log container.
     *
     * @param {HTMLElement} listElement
     */
    function clearActivityLog( listElement ) {
      while ( listElement.firstChild ) {
        listElement.removeChild( listElement.lastChild );
      }
    }

    /**
     * Sets up the activity log clear button to remove all logged alerts on click.
     *
     * @param {HTMLElement|null} button
     * @param {HTMLElement|null} listElement
     */
    function initializeActivityLogButton( button, listElement ) {
      if ( !button || !listElement ) {
        return;
      }
      button.addEventListener( 'click', () => clearActivityLog( listElement ) );
    }

    /*******************************************************************************
     * Description Editor server integration
     *
     * Connects to the Description Editor server (chipper/wrappers/description-editor/description-editor.ts), which is
     * the persistence service for description design: span edits in Design Mode resolve to (message, segment,
     * valueOffset) provenance via the server's provenance document, POST to /api/edit (which back-propagates to the
     * strings YAML and regenerates {sim}-strings_en.json), and the resulting changed values are injected into the
     * running sim's LocalizedStringProperties — the sim's FluentContainer rebuilds its bundle so every rendering of
     * the edited term updates live, with sim state preserved.
     */

    /**
     * Connects to the Description Editor server if one is running, then subscribes to its update events. When the
     * server is unreachable, in-place editing is simply unavailable.
     */
    function initializeEditorServerConnection() {
      if ( !editorState.simRepo ) {
        return;
      }

      if ( domReferences.undoEditButton ) {
        domReferences.undoEditButton.addEventListener( 'click', undoLastEdit );
      }

      fetchEditorDocument()
        .then( () => {
          editorState.connected = true;
          updateEditorServerStatus();

          const eventSource = new EventSource( `${editorState.serverUrl}/api/events` );
          eventSource.addEventListener( 'update', event => {
            let payload = {};
            try {
              payload = JSON.parse( event.data );
            }
            catch( e ) {
              // ignore malformed events
            }
            handleEditorServerUpdate( payload );
          } );
          eventSource.onopen = () => updateEditorServerStatus();
          eventSource.onerror = () => updateEditorServerStatus( 'Editor: reconnecting…', true );
        } )
        .catch( () => {
          editorState.connected = false;
          updateEditorServerStatus();
        } );
    }

    /**
     * Fetches the provenance document (every message with provenance-tagged segments) and rebuilds the reverse-lookup index.
     *
     * @returns {Promise<void>}
     */
    async function fetchEditorDocument() {
      const response = await fetch( `${editorState.serverUrl}/api/document` );
      if ( !response.ok ) {
        throw new Error( `Document fetch failed (${response.status})` );
      }
      const payload = await response.json();
      if ( payload.buildError ) {
        setEditorTransientStatus( `Strings build error: ${payload.buildError}`, true );
      }
      if ( payload.document ) {
        applyEditorDocument( payload.document );
      }
    }

    /**
     * Stores a freshly fetched provenance document and rebuilds the reverse-lookup index.
     *
     * @param {Object} provenanceDocument
     */
    function applyEditorDocument( provenanceDocument ) {
      editorState.provenanceDocument = provenanceDocument;
      rebuildFoldIndex();
    }

    /**
     * Handles a server-sent update (from an editor commit or an external YAML edit in an IDE): refreshes the
     * provenance index and live-injects the changed string values into the running sim.
     *
     * @param {{ changedKeys?: string[], changedStringKeys?: string[] }} payload
     */
    function handleEditorServerUpdate( payload ) {
      fetchEditorDocument().catch( () => setEditorTransientStatus( 'Could not refresh strings document.', true ) );

      const changedStringKeys = ( payload && payload.changedStringKeys ) || [];
      if ( changedStringKeys.length === 0 ) {
        return;
      }

      fetch( `${editorState.serverUrl}/api/strings` )
        .then( response => response.json() )
        .then( data => {
          const injectedCount = injectChangedStrings( changedStringKeys, data.strings || {} );
          if ( injectedCount > 0 ) {
            setEditorTransientStatus( `Updated ${injectedCount} string${injectedCount === 1 ? '' : 's'} in the running sim` );
          }
        } )
        .catch( () => setEditorTransientStatus( 'Could not fetch updated strings.', true ) );
    }

    /**
     * Writes changed string values into the running sim's LocalizedStringProperties via the same-origin iframe.
     * The sim's FluentContainer multilinks all string Properties and rebuilds its FluentBundle on any change, so
     * every rendering that uses an edited term (including shared fragments) recomputes — without reloading the sim.
     * Values are wrapped in the same directional marks that load-unbuilt-strings.js applies, for parity with relaunch.
     *
     * @param {string[]} changedKeys - dot-joined string keys relative to the sim repo, e.g. 'a11y.someSection.someMessage'
     * @param {Object} strings - flat dotKey → value map from GET /api/strings
     * @returns {number} how many string Properties were updated
     */
    function injectChangedStrings( changedKeys, strings ) {
      const innerWindow = designState.innerWindow;
      const chipper = innerWindow && innerWindow.phet && innerWindow.phet.chipper;
      if ( !chipper || !chipper.localizedStrings ) {
        return 0;
      }

      const repoData = ( chipper.stringRepos || [] ).find( data => data.repo === editorState.simRepo );
      if ( !repoData ) {
        return 0;
      }

      let injectedCount = 0;
      for ( const dotKey of changedKeys ) {
        const stringKey = `${repoData.requirejsNamespace}/${dotKey}`;
        const localizedString = chipper.localizedStrings.find( entry => entry.stringKey === stringKey );
        const value = strings[ dotKey ];
        if ( localizedString && typeof value === 'string' ) {
          localizedString.property.value = value.length > 0 ? '\u202a' + value + '\u202c' : value;
          injectedCount++;
        }
      }
      return injectedCount;
    }

    /**
     * Rebuilds the provenance index (rendered text → provenance) and the fluentId → dotKey map from the document. One
     * entry per message, built from the message's default-variant segments.
     */
    function rebuildFoldIndex() {
      const foldIndex = [];
      const fluentIdToDotKey = new Map();
      const messages = ( editorState.provenanceDocument && editorState.provenanceDocument.messages ) || [];

      messages.forEach( message => {
        fluentIdToDotKey.set( message.fluentId, message.dotKey );

        try {
          foldIndex.push( {
            message: message,
            segments: message.segments,
            regex: buildFoldRegex( message.segments )
          } );
        }
        catch( e ) {
          // Skip messages whose segments cannot form a valid regex; they are simply not editable in place.
        }
      } );

      editorState.foldIndex = foldIndex;
      editorState.fluentIdToDotKey = fluentIdToDotKey;
    }

    /**
     * Builds a whitespace-flexible regular expression matching a fold's rendered text, with one capture group per
     * segment so a match locates each segment's position. Static segments match their literal text; variable
     * segments match any value (the live sim renders real values where the server used placeholders).
     * The 'd' flag provides match indices for the groups.
     *
     * @param {{ text: string, kind: string }[]} segments
     * @returns {RegExp}
     */
    function buildFoldRegex( segments ) {
      const parts = segments.map( segment => {
        if ( segment.kind === 'static' ) {
          const collapsed = collapseEditorText( segment.text );
          return `(${escapeRegExpText( collapsed ).replace( / /g, '\\s+' )})`;
        }
        return '([\\s\\S]*?)';
      } );
      return new RegExp( `^\\s*${parts.join( '\\s*' )}\\s*$`, 'd' );
    }

    /**
     * Strips Unicode directional formatting characters that load-unbuilt-strings.js wraps around string values.
     *
     * @param {string} text
     * @returns {string}
     */
    function stripDirectionalMarks( text ) {
      return ( text || '' ).replace( /[\u202a-\u202e\u2066-\u2069]/g, '' );
    }

    /**
     * Normalizes rendered text for provenance matching: directional marks removed, whitespace collapsed, trimmed.
     *
     * @param {string} text
     * @returns {string}
     */
    function collapseEditorText( text ) {
      return stripDirectionalMarks( text ).replace( /\s+/g, ' ' ).trim();
    }

    /**
     * Escapes regular-expression metacharacters in literal text.
     *
     * @param {string} text
     * @returns {string}
     */
    function escapeRegExpText( text ) {
      return text.replace( /[.*+?^${}()|[\]\\]/g, '\\$&' );
    }

    /**
     * Resolves an edited span back to a single YAML edit: matches the span's baseline text against the fold index,
     * locates the changed region within one static segment, and produces the /api/edit payload. Refuses (with a
     * designer-readable error) rather than guessing when the text is ambiguous, not YAML-backed, or the change
     * crosses a variable/fragment boundary.
     *
     * @param {string} baselineRaw - the span's text as originally rendered
     * @param {string} editedRaw - the span's text after the designer's edit
     * @returns {{ edit: { dotKey: string, oldText: string, newText: string, valueOffset: number|undefined }|null, error?: string }}
     */
    function resolveSpanEdit( baselineRaw, editedRaw ) {
      const baseline = collapseEditorText( baselineRaw );
      const edited = collapseEditorText( editedRaw );
      if ( baseline === edited ) {
        return { edit: null };
      }
      if ( baseline.length === 0 ) {
        return { edit: null, error: 'Cannot resolve an edit on empty text.' };
      }

      // Changed region via common prefix/suffix, in the collapsed text space
      let prefixLength = 0;
      while ( prefixLength < baseline.length && prefixLength < edited.length && baseline[ prefixLength ] === edited[ prefixLength ] ) {
        prefixLength++;
      }
      let suffixLength = 0;
      while ( suffixLength < baseline.length - prefixLength && suffixLength < edited.length - prefixLength &&
              baseline[ baseline.length - 1 - suffixLength ] === edited[ edited.length - 1 - suffixLength ] ) {
        suffixLength++;
      }
      const changeStart = prefixLength;
      const changeEnd = baseline.length - suffixLength;
      const replacement = edited.slice( prefixLength, edited.length - suffixLength );

      // For a pure insertion the region is empty, so widen the anchors one character to locate the owning segment.
      const anchorStart = changeStart === changeEnd ? Math.max( 0, changeStart - 1 ) : changeStart;
      const anchorEnd = changeStart === changeEnd ? Math.min( baseline.length, changeEnd + 1 ) : changeEnd;

      const candidateEdits = new Map();
      let sawBoundaryProblem = false;
      let matchedFoldCount = 0;

      for ( const entry of editorState.foldIndex ) {
        const match = entry.regex.exec( baseline );
        if ( !match || !match.indices ) {
          continue;
        }
        matchedFoldCount++;

        // Find the capture group (one per segment) containing the changed region
        let groupIndex = -1;
        for ( let i = 1; i < match.indices.length; i++ ) {
          const range = match.indices[ i ];
          if ( range && anchorStart >= range[ 0 ] && anchorEnd <= range[ 1 ] ) {
            groupIndex = i;
            break;
          }
        }
        if ( groupIndex < 0 ) {
          sawBoundaryProblem = true;
          continue;
        }

        const segment = entry.segments[ groupIndex - 1 ];
        if ( segment.kind !== 'static' ) {
          sawBoundaryProblem = true;
          continue;
        }

        const dotKey = editorState.fluentIdToDotKey.get( segment.messageId );
        if ( !dotKey ) {
          continue;
        }

        const range = match.indices[ groupIndex ];
        const newText = baseline.slice( range[ 0 ], changeStart ) + replacement + baseline.slice( changeEnd, range[ 1 ] );
        const edit = { dotKey: dotKey, oldText: segment.text, newText: newText, valueOffset: segment.valueOffset };

        // The same text routinely matches many folds of one message (and shared fragments match through every
        // consumer); those resolve to the identical YAML edit, so dedupe before deciding whether we are ambiguous.
        candidateEdits.set( [ dotKey, segment.valueOffset, segment.text, newText ].join( '\u0000' ), edit );
      }

      if ( candidateEdits.size === 1 ) {
        return { edit: candidateEdits.values().next().value };
      }
      if ( candidateEdits.size > 1 ) {
        const dotKeys = Array.from( new Set( Array.from( candidateEdits.values() ).map( edit => edit.dotKey ) ) );
        return { edit: null, error: `Ambiguous edit — the text matches ${dotKeys.join( ', ' )}. Edit the YAML directly.` };
      }
      if ( sawBoundaryProblem ) {
        return { edit: null, error: 'The edit touches a variable or fragment boundary — edit the YAML directly.' };
      }
      if ( matchedFoldCount === 0 ) {
        return { edit: null, error: 'This text isn\'t indexed for in-place editing (it may be hard-coded in TypeScript, or a non-default message variant) — edit the YAML in your IDE.' };
      }
      return { edit: null, error: 'Could not resolve this edit to a single string.' };
    }

    /**
     * Commits all pending span-level edits in the formatted view to the editor server. Each successful edit is
     * written to the strings YAML immediately; failures are surfaced and leave the draft intact for correction.
     * Called on Enter and when the formatted view loses focus.
     *
     * @param {HTMLElement} container
     */
    async function commitFormattedViewEdits( container ) {
      if ( !editorState.connected || !container ) {
        return;
      }

      const spans = Array.from( container.querySelectorAll( '.design-editable-text' ) );
      const dirtySpans = spans.filter( span =>
        collapseEditorText( span.textContent ) !== collapseEditorText( span.dataset.baselineText || '' ) );
      if ( dirtySpans.length === 0 ) {
        return;
      }

      let failureCount = 0;
      for ( const span of dirtySpans ) {
        const resolution = resolveSpanEdit( span.dataset.baselineText || '', span.textContent );
        if ( !resolution.edit ) {
          failureCount++;
          setEditorTransientStatus( resolution.error || 'Could not resolve edit.', true );
          continue;
        }

        try {
          await postEditorEdit( resolution.edit );
          editorState.undoJournal.push( {
            dotKey: resolution.edit.dotKey,
            oldText: resolution.edit.newText.trim(),
            newText: resolution.edit.oldText.trim(),
            valueOffset: resolution.edit.valueOffset
          } );
          span.dataset.baselineText = span.textContent;
          setEditorTransientStatus( `Saved to ${resolution.edit.dotKey}` );
        }
        catch( error ) {
          failureCount++;
          setEditorTransientStatus( error.message, true );
        }
      }
      updateUndoButton();

      if ( failureCount === 0 ) {

        // Drop the draft so the next live render (which reflects the injected values) becomes the new baseline.
        designState.formattedDocumentDraft = null;
        designState.liveFormattedDocument = null;
        rerenderCurrentPDOMViews();
      }
      else {

        // Refresh the draft snapshot so successfully committed spans are no longer flagged as edited.
        updateFormattedDocumentDraft( container );
      }
    }

    /**
     * Commits an edit to one context-response item in the Context Responses list. The response text is resolved back
     * to its source message in the strings YAML through the same provenance path as formatted-view edits, so the
     * change round-trips to the YAML and live-injects into the running sim. On failure the span reverts to its
     * baseline so the displayed response stays consistent with the YAML.
     *
     * @param {HTMLElement} editable - the contenteditable response span, carrying its baseline in dataset.baselineText
     */
    async function commitContextResponseEdit( editable ) {
      if ( !editorState.connected || !designState.designModeEnabled ) {
        return;
      }
      const baseline = editable.dataset.baselineText || '';
      if ( collapseEditorText( editable.textContent ) === collapseEditorText( baseline ) ) {
        return;
      }

      const resolution = resolveSpanEdit( baseline, editable.textContent );
      if ( !resolution.edit ) {
        setEditorTransientStatus( resolution.error || 'Could not resolve edit.', true );
        editable.textContent = baseline;
        return;
      }

      try {
        await postEditorEdit( resolution.edit );
        editorState.undoJournal.push( {
          dotKey: resolution.edit.dotKey,
          oldText: resolution.edit.newText.trim(),
          newText: resolution.edit.oldText.trim(),
          valueOffset: resolution.edit.valueOffset
        } );
        editable.dataset.baselineText = editable.textContent;
        updateUndoButton();
        setEditorTransientStatus( `Saved to ${resolution.edit.dotKey}` );
      }
      catch( error ) {
        setEditorTransientStatus( error.message, true );
        editable.textContent = baseline;
      }
    }

    /**
     * POSTs one edit to the editor server, throwing a designer-readable Error on rejection.
     *
     * @param {{ dotKey: string, oldText: string, newText: string, valueOffset: number|undefined }} edit
     * @returns {Promise<Object>}
     */
    async function postEditorEdit( edit ) {
      const response = await fetch( `${editorState.serverUrl}/api/edit`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify( edit )
      } );
      const payload = await response.json().catch( () => ( {} ) );
      if ( !response.ok ) {
        throw new Error( payload.error || `Edit failed (${response.status})` );
      }
      return payload;
    }

    /**
     * Reverts the most recently committed edit by applying its inverse through the same /api/edit path.
     */
    async function undoLastEdit() {
      const inverse = editorState.undoJournal.pop();
      if ( !inverse ) {
        updateUndoButton();
        return;
      }

      try {
        await postEditorEdit( inverse );
        setEditorTransientStatus( `Undid edit to ${inverse.dotKey}` );
      }
      catch( error ) {
        editorState.undoJournal.push( inverse );
        setEditorTransientStatus( `Undo failed: ${error.message}`, true );
      }
      updateUndoButton();
    }

    /**
     * Handles Enter (commit) and Escape (discard) in the formatted-view editor when the server is connected.
     *
     * @param {KeyboardEvent} event
     * @param {HTMLElement} container
     */
    function handleFormattedEditorKeydown( event, container ) {
      if ( !editorState.connected || !designState.designModeEnabled ) {
        return;
      }
      if ( event.key === 'Enter' ) {
        event.preventDefault();
        commitFormattedViewEdits( container );
      }
      else if ( event.key === 'Escape' ) {
        event.preventDefault();
        discardFormattedViewEdits();
      }
    }

    /**
     * Discards all uncommitted formatted-view edits and re-renders from the live PDOM.
     */
    function discardFormattedViewEdits() {
      designState.formattedDocumentDraft = null;
      designState.liveFormattedDocument = null;
      rerenderCurrentPDOMViews();
      setEditorTransientStatus( 'Edits discarded.' );
    }

    /**
     * Updates the editor-server status chip to reflect the connection state.
     *
     * @param {string} [message] - transient message; omitted for the steady-state connected/offline label
     * @param {boolean} [isError]
     */
    function updateEditorServerStatus( message, isError ) {
      const status = domReferences.editorServerStatus;
      if ( !status ) {
        return;
      }
      status.dataset.connected = editorState.connected ? 'true' : 'false';
      status.dataset.error = isError ? 'true' : 'false';
      status.textContent = message || ( editorState.connected ? 'Editor: connected' : 'Editor: offline' );
    }

    /**
     * Shows a transient message in the status chip, reverting to the steady-state label after a few seconds.
     *
     * @param {string} message
     * @param {boolean} [isError]
     */
    function setEditorTransientStatus( message, isError ) {
      updateEditorServerStatus( message, isError );
      clearTimeout( editorState.statusResetTimeoutId );
      editorState.statusResetTimeoutId = setTimeout( () => updateEditorServerStatus(), 5000 );
    }

    /**
     * Shows or hides the Undo button based on whether the undo journal has entries.
     */
    function updateUndoButton() {
      if ( domReferences.undoEditButton ) {
        domReferences.undoEditButton.hidden = editorState.undoJournal.length === 0;
      }
    }

    /**
     * Subscribes to iframe load events, wiring DOM observers and view renderers once the sim is ready.
     *
     * @param {{ iframe: HTMLIFrameElement|null, alertList: HTMLElement|null, alertContainer: HTMLElement|null, clearActivityLogButton: HTMLElement|null, domCopyContainer: HTMLElement|null, accessibleViewStateCode: HTMLElement|null }} domRefs
     * @param {{ formatted: HTMLElement|null }} viewContainers
     * @param {{ formatted: Function }} renderers
     * @param {MutationObserverInit} mutationConfig
     */
    function setupMessageListener( domRefs, viewContainers, renderers, mutationConfig ) {
      if ( !domRefs || !domRefs.iframe ) {
        return;
      }

      window.addEventListener( 'message', event => {
        if ( !event.data ) {
          return;
        }

        let data;
        try {
          data = JSON.parse( event.data );
        }
        catch( e ) {
          return;
        }

        if ( data.type !== 'load' ) {
          return;
        }

        const innerWindow = domRefs.iframe.contentWindow;
        if ( !innerWindow ) {
          return;
        }

        // eslint-disable-next-line dot-notation
        const phetNamespace = innerWindow[ 'phet' ];
        if ( !phetNamespace || !phetNamespace.joist || !phetNamespace.joist.display ) {
          return;
        }

        const PDOMRoot = phetNamespace.joist.display.pdomRootElement;
        if ( !PDOMRoot ) {
          return;
        }
        designState.isFrozen = false;
        designState.frozenPDOMRoot = null;
        designState.frozenSnapshot = null;
        designState.liveFormattedDocument = null;
        designState.simFreezeController = null;
        if ( designState.formattedDocumentDraft ) {
          designState.formattedDocumentDraft.active = false;
        }
        designState.pdomRoot = PDOMRoot;
        designState.innerWindow = innerWindow;
        installSimFreezeController( phetNamespace.joist.sim );
        updateFreezeControls();

        const ariaLiveElementsContainer = phetNamespace.joist.sim.display.descriptionUtteranceQueue.announcer.ariaLiveContainer;
        const globalContainer = phetNamespace.scenery.globalDescriptionQueue.announcer.ariaLiveContainer;

        const simDisplayElements = Array.prototype.slice.call( ariaLiveElementsContainer.children );
        const globalElements = Array.prototype.slice.call( globalContainer.children );
        const allSourceAriaLiveElements = [ ...simDisplayElements, ...globalElements ];

        const invalidateView = addPDOMObserver( PDOMRoot, viewContainers, mutationConfig, renderers, domRefs.accessibleViewStateCode );

        const selectedScreenProperty = phetNamespace.joist.sim.selectedScreenProperty;
        if ( selectedScreenProperty && typeof selectedScreenProperty.link === 'function' ) {
          selectedScreenProperty.link( invalidateView );
        }
        const homeSelectedScreenProperty = phetNamespace.joist.sim.homeScreen &&
                                           phetNamespace.joist.sim.homeScreen.model &&
                                           phetNamespace.joist.sim.homeScreen.model.selectedScreenProperty;
        if ( homeSelectedScreenProperty && typeof homeSelectedScreenProperty.link === 'function' ) {
          homeSelectedScreenProperty.link( invalidateView );
        }

        // HACK ALERT! When checkboxes become checked, they only set the checked attribute, which does not trigger a
        // mutation or input event. Therefore, we need to monkey-patch the checked property setter to notify us when it
        // changes so we can invalidate the formatted view and re-render immediately.
        // Note that this apparently doesn't work for keyboard input because with keyboard input, the checked
        // attribute is updated in browser-native code. So we need this code for mouse input and the input/change
        // listeners in addPDOMObserver for keyboard input.
        const frameWindow = PDOMRoot.ownerDocument.defaultView;
        if ( frameWindow && !frameWindow.__a11yViewCheckedPatched ) {

          // Grab the original getter/setter for HTMLInputElement.checked inside the iframe.
          const descriptor = Object.getOwnPropertyDescriptor( frameWindow.HTMLInputElement.prototype, 'checked' );
          if ( descriptor && descriptor.set && descriptor.get ) {
            const originalGet = descriptor.get;
            const originalSet = descriptor.set;

            Object.defineProperty( frameWindow.HTMLInputElement.prototype, 'checked', {
              configurable: descriptor.configurable,
              enumerable: descriptor.enumerable,
              get: originalGet,
              set( value ) {

                // Snapshot the current property value before delegating to the native setter.
                const previous = originalGet.call( this );

                // Let the browser perform the original state change.
                originalSet.call( this, value );

                // When the value actually flips, notify the formatted view so it can re-render immediately.
                if ( previous !== value ) {
                  invalidateView();
                }
              }
            } );

            // Remember that we’ve already patched this iframe so we don’t redefine the property on subsequent loads.
            frameWindow.__a11yViewCheckedPatched = true;
          }
        }

        if ( domRefs.alertList && domRefs.alertContainer ) {
          for ( let i = 0; i < allSourceAriaLiveElements.length; i++ ) {
            addLiveObserver( allSourceAriaLiveElements[ i ], domRefs.alertList, domRefs.alertContainer, mutationConfig );
          }
        }

        const iframeDocument = domRefs.iframe.contentWindow.document;

        domRefs.iframe.focus();

        let previousElement = null;
        const handleIframeFocus = () => {
          if ( previousElement ) {
            previousElement.classList.remove( 'highlight' );
          }
          const activeElement = iframeDocument.activeElement;
          previousElement = activeElement;
          const isDocumentBody = activeElement === iframeDocument.body;
          if ( activeElement && !isDocumentBody && typeof activeElement.classList !== 'undefined' ) {
            activeElement.classList.add( 'highlight' );
          }
        };

        iframeDocument.addEventListener( 'focusin', handleIframeFocus );
        handleIframeFocus();
      } );
    }

    /**
     * Collects frequently accessed DOM nodes for later use.
     *
     * @returns {{ iframe: HTMLIFrameElement|null, alertList: HTMLElement|null, alertContainer: HTMLElement|null, clearActivityLogButton: HTMLElement|null, domCopyContainer: HTMLElement|null, accessibleViewStateCode: HTMLElement|null, splitLayout: HTMLElement|null, splitPanes: HTMLElement[], splitResizers: HTMLElement[], designModeCheckbox: HTMLInputElement|null, freezeDesignButton: HTMLElement|null, freezeStatus: HTMLElement|null, editorServerStatus: HTMLElement|null, undoEditButton: HTMLElement|null, responseDesignsContainer: HTMLElement|null, responseDesignList: HTMLElement|null }}
     */
    function createDomReferences() {
      return {
        iframe: document.getElementById( 'iframe' ),
        alertList: document.getElementById( 'alert-list' ),
        alertContainer: document.getElementById( 'polite-element-container' ),
        clearActivityLogButton: document.getElementById( 'clear-activity-log-button' ),
        domCopyContainer: document.getElementById( 'dom-copy-container' ),
        accessibleViewStateCode: document.getElementById( 'accessible-view-state-code' ),
        splitLayout: document.getElementById( 'split-layout' ),
        splitPanes: Array.from( document.querySelectorAll( '.split-pane' ) ),
        splitResizers: Array.from( document.querySelectorAll( '.split-resizer' ) ),
        designModeCheckbox: document.getElementById( 'design-mode-checkbox' ),
        freezeDesignButton: document.getElementById( 'freeze-design-button' ),
        freezeStatus: document.getElementById( 'freeze-status' ),
        editorServerStatus: document.getElementById( 'editor-server-status' ),
        undoEditButton: document.getElementById( 'undo-edit-button' ),
        responseDesignsContainer: document.getElementById( 'response-designs-container' ),
        responseDesignList: document.getElementById( 'response-design-list' )
      };
    }

    /**
     * Resolves the specific DOM view containers under the provided root element.
     *
     * @param {HTMLElement|null} root
     * @returns {{ formatted: HTMLElement|null }}
     */
    function createViewContainers( root ) {
      if ( !root ) {
        return {
          formatted: null
        };
      }

      return {
        formatted: root.querySelector( '[data-view="formatted"]' )
      };
    }

    /**
     * Enables live-reload updates for local development when the query parameter is present.
     */
    function initializeLiveReload() {
      const query = new URLSearchParams( window.location.search );
      if ( !query.has( 'liveReload' ) ) {
        return;
      }
      new EventSource( '/esbuild' ).addEventListener( 'change', () => location.reload() );
    }

  } )();
</script>
</body>
</html>
