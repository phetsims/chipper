<div class="wrapper">

  <div id="content">
    <div id="split-layout" class="split-layout">

      <!--The sim and alert containers will both be placed in here -->

              </div>

            <div id="response-design-list"></div>
          </div>
        </div>
      </div>

      <div class="split-resizer" role="separator" aria-orientation="vertical"

        <h3>Accessible View State</h3>
        <div class="accessible_view_state_container" role="presentation">

        </div>
      </div>

      <div class="split-resizer" role="separator" aria-orientation="vertical"
           aria-label="Resize accessible view state and state descriptions columns" tabindex="0"
           data-resizer-index="1"></div>

      <!--The PDOM copy will be placed in this container -->

        <div id="pdom">

                Design Mode
              </label>
              <button id="freeze-design-button" type="button" aria-pressed="false">Freeze</button>
              <span id="freeze-status" class="freeze-status" data-frozen="false">Live</span>
              <span id="prompt-status" class="prompt-status" aria-live="polite"></span>
              <button id="clear-prompt-button" type="button">Clear Prompt</button>
              <button id="download-jsonl-button" type="button">Download JSONL</button>
              <button id="download-codex-prompt-button" type="button">Download Codex Prompt</button>
            </div>

              <div id="stale-edits-list"></div>
            </div>
          </div>
        </div>
      </div>

    </div>

</div>

<script type="application/javascript">
  ( () => {
    const IS_BUILT_STRING = '{{IS_BUILT}}';
    const IS_BUILT = IS_BUILT_STRING.indexOf( '{{' ) !== 0; // escape for better syntax highlighting support

    /**
     * Initializes the embedded simulation iframe by reading the search parameters, building the expected
     * simulation URL, and enabling sticky layout behavior once the iframe is configured.
     */
    function initializeSimulationFrame() {
      const simulationQueryString = new URLSearchParams( window.location.search );

      // TODO: This code is very PhET-sim specific, we would like a way to specify an arbitrary scenery-stack app
      // TODO: https://github.com/phetsims/chipper/issues/1512
      let sim = simulationQueryString.get( 'sim' );

      // Remove the sim query parameter from the URL so that it doesn't go to the iframe url
      simulationQueryString.delete( 'sim' );

      // Do not liveReload on the nested iframe, just in the outer a11y view.
      simulationQueryString.delete( 'liveReload' );

      // Append the required parameters.
      simulationQueryString.set( 'postMessageOnLoad', '' );
      simulationQueryString.set( 'postMessageOnError', '' );
      simulationQueryString.set( 'supportsInteractiveDescription', 'true' );

      // in unbuilt mode and on phet-server, the brand suffix is removed
      const filenameEnding = ( window.location.hostname === 'phet.colorado.edu' || !IS_BUILT ) ? '.html' : '_phet.html';

      if ( IS_BUILT ) {
        sim = '{{PHET_REPOSITORY}}';
      }
      if ( !sim ) {
        throw new Error( 'No sim query parameter provided' );
      }

      // Unbuilt sims include all locales in the en file, built versions only include all strings in the all file
      const simWithLocale = `${sim}_${IS_BUILT ? 'all' : 'en'}`;
      const iframe = document.getElementById( 'iframe' );
      if ( !iframe ) {
        return;
      }

      let simURL = `../../../${sim}/${simWithLocale}${filenameEnding}?${simulationQueryString}`;
      if ( IS_BUILT ) {
        simURL = `./${simWithLocale}${filenameEnding}?${simulationQueryString}`;
      }

      iframe.setAttribute( 'src', simURL );
    }

    initializeSimulationFrame();
  } )();
</script>

<script>
  ( () => {
    // Number of alerts that remain in the Activity log
    const ACTIVITY_LOG_LENGTH = 40;

    // Helpers to keep shouldDisplay predicates readable when filtering ARIA attributes.
    const DISPLAY_WHEN_TRUE = value => value === 'true';
    const DISPLAY_WHEN_NOT_FALSE = value => value !== 'false';
    const DISPLAY_WHEN_PRESENT = value => value && value.trim().length > 0;
    const RELATIONSHIP_PLACEHOLDER = '...';
    let RELATIONSHIP_LOOKUP_ROOT = null;

    /**
     * Formats IDREF-based relationship attributes by showing readable content for simple elements. If the referenced
     * element is a heading or paragraph, return its text as-is; otherwise fall back to the standard placeholder.
     * Missing references are called out so broken relationships are visible in the viewer.
     *
     * @param {string} value
     * @param {HTMLElement} element
     * @returns {string}
     */
    function formatRelationshipValue( value, element ) {

      // Prefer the current PDOM root so frozen clones resolve relationships within the same frozen state.
      const lookupRoot = RELATIONSHIP_LOOKUP_ROOT || ( element ? element.ownerDocument : document );

      return value.split( /\s+/ ).map( idref => {
        if ( !idref ) {
          return RELATIONSHIP_PLACEHOLDER;
        }

        const target = getElementByIdFromLookupRoot( lookupRoot, idref );
        if ( !target ) {
          return 'Missing!';
        }

        const tag = target.tagName.toLowerCase();
        if ( tag === 'p' || /^h[1-6]$/.test( tag ) ) {
          const text = target.textContent || '';
          const tagLabel = `(${tag}) `;
          return text ? `${tagLabel}${text}` : `${tagLabel}${idref} (empty)`;
        }

        return RELATIONSHIP_PLACEHOLDER;
      } ).join( ' ' );
    }

    /**
     * Finds an element by id in either a Document or a detached PDOM root clone.
     *
     * @param {Document|HTMLElement} lookupRoot
     * @param {string} id
     * @returns {HTMLElement|null}
     */
    function getElementByIdFromLookupRoot( lookupRoot, id ) {
      if ( lookupRoot && typeof lookupRoot.getElementById === 'function' ) {
        return lookupRoot.getElementById( id );
      }
      if ( lookupRoot && typeof lookupRoot.querySelector === 'function' ) {
        return lookupRoot.querySelector( `[id="${id.replace( /\\/g, '\\\\' ).replace( /"/g, '\\"' )}"]` );
      }
      return null;
    }

    /**
     * Formats the value for an ARIA attribute using optional value formatting metadata.
     *
     * @param {{ name: string, shouldDisplay?: function(string, HTMLElement): boolean, formatValue?: function(string, HTMLElement): string }} config
     * @param {string} value
     * @param {HTMLElement} element
     * @returns {string}
     */
    function formatAriaValue( config, value, element ) {
      if ( config.formatValue ) {
        return config.formatValue( value, element );
      }
      return value;
    }

    // The attributes that we want to display as additional data in the PDOM copy. Otherwise, these are invisible
    // unless you inspect the DOM. For each entry, you can provide a shouldDisplay predicate that will control
    // how it is shown.
    const IMPORTANT_ARIA_ATTRIBUTES = [
      // Roles and semantics
      { name: 'role' },
      { name: 'aria-roledescription', shouldDisplay: DISPLAY_WHEN_PRESENT },

      // Relationships and labelling
      { name: 'aria-label', shouldDisplay: DISPLAY_WHEN_PRESENT },
      { name: 'aria-labelledby', shouldDisplay: DISPLAY_WHEN_PRESENT, formatValue: formatRelationshipValue },
      { name: 'aria-describedby', shouldDisplay: DISPLAY_WHEN_PRESENT, formatValue: formatRelationshipValue },
      { name: 'aria-controls', shouldDisplay: DISPLAY_WHEN_PRESENT, formatValue: formatRelationshipValue },
      { name: 'aria-owns', shouldDisplay: DISPLAY_WHEN_PRESENT, formatValue: formatRelationshipValue },
      {
        name: 'aria-activedescendant',
        shouldDisplay: DISPLAY_WHEN_PRESENT,
        formatValue: formatRelationshipValue
      },

      { name: 'aria-hidden', shouldDisplay: DISPLAY_WHEN_TRUE },
      { name: 'aria-modal', shouldDisplay: DISPLAY_WHEN_TRUE },

      // Widget state
      { name: 'aria-expanded' },
      { name: 'aria-pressed' },
      { name: 'aria-checked' },
      { name: 'aria-selected', shouldDisplay: DISPLAY_WHEN_TRUE },
      { name: 'aria-current', shouldDisplay: DISPLAY_WHEN_NOT_FALSE },
      { name: 'aria-haspopup', shouldDisplay: DISPLAY_WHEN_NOT_FALSE },
      { name: 'aria-required', shouldDisplay: DISPLAY_WHEN_TRUE },
      { name: 'aria-invalid', shouldDisplay: DISPLAY_WHEN_NOT_FALSE },
      { name: 'aria-readonly', shouldDisplay: DISPLAY_WHEN_TRUE },
      { name: 'aria-disabled', shouldDisplay: DISPLAY_WHEN_TRUE },

      // Live region hints
      { name: 'aria-live', shouldDisplay: value => value && value !== 'off' },
      { name: 'aria-atomic', shouldDisplay: DISPLAY_WHEN_TRUE },

      // Orientation and range metadata
      { name: 'aria-orientation', shouldDisplay: DISPLAY_WHEN_PRESENT },
      { name: 'aria-valuemin' },
      { name: 'aria-valuemax' },
      { name: 'aria-valuetext' },

      // Set membership
      { name: 'aria-level', shouldDisplay: DISPLAY_WHEN_PRESENT },
      { name: 'aria-posinset', shouldDisplay: DISPLAY_WHEN_PRESENT },
      { name: 'aria-setsize', shouldDisplay: DISPLAY_WHEN_PRESENT },

     * @param {{ designModeCheckbox: HTMLInputElement|null, freezeDesignButton: HTMLElement|null, freezeStatus: HTMLElement|null, promptStatus: HTMLElement|null, clearPromptButton: HTMLElement|null, downloadJsonlButton: HTMLElement|null, downloadCodexPromptButton: HTMLElement|null, manualContextBeforeButton: HTMLElement|null, manualContextAfterButton: HTMLElement|null, manualContextAddButton: HTMLElement|null }} domRefs

    /**

     */
    function loadBooleanPreference( key, fallback ) {
      try {

        if ( value === 'true' ) {
          return true;
        }
        if ( value === 'false' ) {
          return false;
        }
      }
      catch( e ) {
        // ignore storage errors
      }
      return fallback;
    }

    /**
     * Persists a boolean preference to localStorage.
     *
     * @param {string} key
     * @param {boolean} value
     */

      try {
        localStorage.setItem( key, value ? 'true' : 'false' );
      }
      catch( e ) {

    }

    /**

    /**
     * Computes the compact prescription counts shown in the toolbar and prompt export.
     *
     * @returns {{ stateDescriptionAdditions: number, stateDescriptionReplacements: number, stateDescriptionDeletions: number, responsePrescriptions: number }}
     */
    function getPromptPrescriptionCounts() {
      const counts = {
        stateDescriptionAdditions: 0,
        stateDescriptionReplacements: 0,
        stateDescriptionDeletions: 0,
        responsePrescriptions: designState.responseDesigns.length
      };

      const formattedViewEdit = getFormattedViewEditForExport();
      if ( formattedViewEdit ) {
        const diffCounts = countOrderedTextDiffOperations( formattedViewEdit.diff );
        counts.stateDescriptionAdditions += diffCounts.additions;
        counts.stateDescriptionReplacements += diffCounts.replacements;
        counts.stateDescriptionDeletions += diffCounts.deletions;
      }

      designState.editRegistry.forEach( edit => {
        if ( !edit.edited ) {
          return;
        }
        if ( edit.operation === 'insertBefore' || edit.operation === 'insertAfter' ) {
          counts.stateDescriptionAdditions++;
        }
        else if ( edit.operation === 'deleteText' ) {
          counts.stateDescriptionDeletions++;
        }
        else {
          counts.stateDescriptionReplacements++;
        }
      } );

      return counts;
    }

    /**
     * Counts document-level diff operations as additions, replacements, and deletions.
     *
     * @param {Object[]} diff
     * @returns {{ additions: number, replacements: number, deletions: number }}
     */
    function countOrderedTextDiffOperations( diff ) {
      let addedUnits = 0;
      let removedUnits = 0;
      ( diff || [] ).forEach( entry => {
        const unitCount = countDiffTextUnits( entry.text );
        if ( entry.operation === 'add' ) {
          addedUnits += unitCount;
        }
        else if ( entry.operation === 'remove' ) {
          removedUnits += unitCount;
        }
      } );

      const replacements = Math.min( addedUnits, removedUnits );
      return {
        additions: Math.max( 0, addedUnits - replacements ),
        replacements: replacements,
        deletions: Math.max( 0, removedUnits - replacements )
      };
    }

    /**
     * Counts line-like units represented by one diff entry.
     *
     * @param {string} text
     * @returns {number}
     */
    function countDiffTextUnits( text ) {
      return ( text || '' )
        .split( /\n+/ )
        .map( line => line.trim() )
        .filter( line => line.length > 0 ).length;
    }

    /**

    /**

        rerenderCurrentPDOMViews();
        renderAccessibleViewState( designState.innerWindow, domReferences.accessibleViewStateCode );
        return;
      }

      if ( !designState.pdomRoot || !designState.innerWindow ) {
        return;
      }

      designState.isFrozen = true;
      designState.frozenPDOMRoot = designState.pdomRoot.cloneNode( true );
      rerenderCurrentPDOMViews();
      designState.frozenSnapshot = captureDesignSnapshot( designState.frozenPDOMRoot );
      renderAccessibleViewStateValue(
        designState.frozenSnapshot ? designState.frozenSnapshot.accessibleViewState : null,
        domReferences.accessibleViewStateCode

    /**
     * Loads persisted column widths, falling back to equal columns when values are missing or invalid.
     *
     * @returns {number[]}
     */
    function loadColumnWidths() {
      try {
        const value = localStorage.getItem( COLUMN_WIDTHS_STORAGE_KEY );
        if ( value ) {
          const widths = JSON.parse( value );
          if ( areValidColumnWidths( widths ) ) {
            return normalizeColumnWidths( widths );
          }
        }
      }
      catch( e ) {
        // ignore storage errors, fall back to default
      }
      return DEFAULT_COLUMN_WIDTHS.slice();
    }

    /**
     * Persists current column widths to localStorage, intentionally ignoring storage failures.
     *
     * @param {number[]} widths
     */
    function storeColumnWidths( widths ) {
      try {
        localStorage.setItem( COLUMN_WIDTHS_STORAGE_KEY, JSON.stringify( widths ) );
      }
      catch( e ) {
        // ignore storage failures
      }
    }

    /**
     * Checks whether the provided column widths can be applied.
     *
     * @param {unknown} widths
     * @returns {boolean}
     */
    function areValidColumnWidths( widths ) {
      return Array.isArray( widths ) &&
             widths.length === 3 &&
             widths.every( width => typeof width === 'number' &&
             Number.isFinite( width ) &&
             width >= MIN_COLUMN_WIDTH_PERCENT );
    }

    /**
     * Normalizes column widths so they sum to 100%.
     *
     * @param {number[]} widths
     * @returns {number[]}
     */
    function normalizeColumnWidths( widths ) {
      const total = widths.reduce( ( sum, width ) => sum + width, 0 );
      if ( total <= 0 ) {
        return DEFAULT_COLUMN_WIDTHS.slice();
      }
      return widths.map( width => width / total * 100 );
    }

    /**
     * Applies column widths to the three split panes.
     *
     * @param {HTMLElement[]} panes
     * @param {number[]} widths
     */
    function applyColumnWidths( panes, widths ) {
      panes.forEach( ( pane, index ) => {
        pane.style.flexBasis = `${widths[ index ]}%`;
      } );
    }

    /**
     * Reads the current column widths from rendered geometry.
     *
     * @param {HTMLElement[]} panes
     * @returns {number[]}
     */
    function getCurrentColumnWidths( panes ) {
      const pixelWidths = panes.map( pane => pane.getBoundingClientRect().width );
      const total = pixelWidths.reduce( ( sum, width ) => sum + width, 0 );
      if ( total <= 0 ) {
        return DEFAULT_COLUMN_WIDTHS.slice();
      }
      return pixelWidths.map( width => width / total * 100 );
    }

    /**
     * Initializes the two grab bars that resize the three inspection columns.
     *
     * @param {HTMLElement|null} splitLayout
     * @param {HTMLElement[]} panes
     * @param {HTMLElement[]} resizers
     */
    function initializeColumnResizers( splitLayout, panes, resizers ) {
      if ( !splitLayout || panes.length !== 3 || resizers.length !== 2 ) {
        return;
      }

      applyColumnWidths( panes, loadColumnWidths() );

      resizers.forEach( resizer => {
        resizer.addEventListener( 'mousedown', event => {
          const resizerIndex = Number( resizer.dataset.resizerIndex );
          if ( !Number.isFinite( resizerIndex ) ) {
            return;
          }

          event.preventDefault();
          const startX = event.clientX;
          const startWidths = panes.map( pane => pane.getBoundingClientRect().width );
          const pairWidth = startWidths[ resizerIndex ] + startWidths[ resizerIndex + 1 ];
          const minWidth = Math.min( 240, pairWidth / 2 );

          resizer.classList.add( 'dragging' );
          document.body.classList.add( 'resizing-columns' );

          const onMouseMove = moveEvent => {
            const nextWidths = startWidths.slice();
            const delta = moveEvent.clientX - startX;
            const leftWidth = clampNumber( startWidths[ resizerIndex ] + delta, minWidth, pairWidth - minWidth );
            nextWidths[ resizerIndex ] = leftWidth;
            nextWidths[ resizerIndex + 1 ] = pairWidth - leftWidth;
            const nextPercentages = widthsFromPixels( nextWidths );
            applyColumnWidths( panes, nextPercentages );
          };

          const onMouseUp = () => {
            resizer.classList.remove( 'dragging' );
            document.body.classList.remove( 'resizing-columns' );
            document.removeEventListener( 'mousemove', onMouseMove );
            document.removeEventListener( 'mouseup', onMouseUp );
            storeColumnWidths( getCurrentColumnWidths( panes ) );
          };

          document.addEventListener( 'mousemove', onMouseMove );
          document.addEventListener( 'mouseup', onMouseUp );
        } );

        resizer.addEventListener( 'keydown', event => {
          if ( event.key !== 'ArrowLeft' && event.key !== 'ArrowRight' ) {
            return;
          }

          event.preventDefault();
          const resizerIndex = Number( resizer.dataset.resizerIndex );
          const direction = event.key === 'ArrowLeft' ? -1 : 1;
          const widths = adjustColumnPairWidths(
            getCurrentColumnWidths( panes ),
            resizerIndex,
            direction * RESIZER_KEYBOARD_STEP_PERCENT
          );
          applyColumnWidths( panes, widths );
          storeColumnWidths( widths );
        } );
      } );
    }

    /**
     * Converts pixel widths to percentages.
     *
     * @param {number[]} pixelWidths
     * @returns {number[]}
     */
    function widthsFromPixels( pixelWidths ) {
      const total = pixelWidths.reduce( ( sum, width ) => sum + width, 0 );
      if ( total <= 0 ) {
        return DEFAULT_COLUMN_WIDTHS.slice();
      }
      return pixelWidths.map( width => width / total * 100 );
    }

    /**
     * Adjusts one neighboring column pair while preserving total width.
     *
     * @param {number[]} widths
     * @param {number} resizerIndex
     * @param {number} delta
     * @returns {number[]}
     */
    function adjustColumnPairWidths( widths, resizerIndex, delta ) {
      if ( resizerIndex < 0 || resizerIndex > 1 ) {
        return widths;
      }

      const nextWidths = widths.slice();
      const pairWidth = nextWidths[ resizerIndex ] + nextWidths[ resizerIndex + 1 ];
      const leftWidth = clampNumber(
        nextWidths[ resizerIndex ] + delta,
        MIN_COLUMN_WIDTH_PERCENT,
        pairWidth - MIN_COLUMN_WIDTH_PERCENT
      );
      nextWidths[ resizerIndex ] = leftWidth;
      nextWidths[ resizerIndex + 1 ] = pairWidth - leftWidth;
      return normalizeColumnWidths( nextWidths );
    }

    /**
     * Clamps a number to a range.
     *
     * @param {number} value
     * @param {number} min
     * @param {number} max
     * @returns {number}
     */
    function clampNumber( value, min, max ) {
      return Math.max( min, Math.min( max, value ) );
    }

    // Elements that exist purely for document structure; we flatten them when building the formatted view.
    const DECORATOR_TAGS = new Set( [ 'SECTION', 'ARTICLE', 'MAIN', 'ASIDE' ] );

    let relatedGroupWrappers = null;

    /**
     * Renders a formatted, human-friendly representation of the PDOM structure.
     *
     * @param {HTMLElement} pdomRoot
     * @param {HTMLElement|null} container
     */
    function renderFormattedView( pdomRoot, container ) {
      if ( !container ) {
        return;
      }
      container.innerHTML = '';
      designState.activeLocatorKeys = new Set();
      relatedGroupWrappers = new Map();
      try {
        const fragment = document.createDocumentFragment();
        appendFormattedContent( pdomRoot, fragment );

        if ( fragment.childNodes.length === 0 ) {
          const emptyMessage = document.createElement( 'p' );
          emptyMessage.textContent = 'No accessible content available.';
          fragment.appendChild( emptyMessage );
        }

        container.appendChild( fragment );
        configureFormattedDocumentEditor( container );
        updateStaleEditSection();
      }
      finally {
        relatedGroupWrappers = null;
      }
    }

    /**
     * Configures the formatted view as a single document-editing surface and captures a baseline for diff export.
     *
     * @param {HTMLElement} container
     */
    function configureFormattedDocumentEditor( container ) {
      const renderedHTML = container.innerHTML;
      const renderedText = getFormattedDocumentText( container );
      const draft = designState.formattedDocumentDraft;
      designState.liveFormattedDocument = {
        baselineText: renderedText,
        baselineHTML: renderedHTML
      };

      if ( draft && draft.edited && draft.active && designState.designModeEnabled ) {
        container.innerHTML = draft.editedHTML;
      }
      else {
        if ( !draft || !draft.edited ) {
          designState.formattedDocumentDraft = {
            baselineText: renderedText,
            baselineHTML: renderedHTML,
            editedText: renderedText,
            editedHTML: renderedHTML,
            edited: false,
            active: false
          };
        }
      }

      container.contentEditable = designState.designModeEnabled ? 'true' : 'false';
      container.spellcheck = designState.designModeEnabled;
      container.oninput = () => updateFormattedDocumentDraft( container );
      highlightFormattedDocumentChanges( container );
    }

    /**
     * Updates the document-level state-description draft after the designer edits the formatted view.
     *
     * @param {HTMLElement} container
     */
    function updateFormattedDocumentDraft( container ) {
      let draft = designState.formattedDocumentDraft;
      if ( !draft ) {
        const liveDocument = designState.liveFormattedDocument;
        const text = liveDocument ? liveDocument.baselineText : getFormattedDocumentText( container );
        draft = {
          baselineText: text,
          baselineHTML: liveDocument ? liveDocument.baselineHTML : container.innerHTML,
          editedText: text,
          editedHTML: liveDocument ? liveDocument.baselineHTML : container.innerHTML,
          edited: false,
          active: false
        };
        designState.formattedDocumentDraft = draft;
      }

      if ( !draft.active ) {
        const liveDocument = designState.liveFormattedDocument;
        draft.baselineText = liveDocument ? liveDocument.baselineText : draft.baselineText;
        draft.baselineHTML = liveDocument ? liveDocument.baselineHTML : draft.baselineHTML;
      }

      draft.editedText = getFormattedDocumentText( container );
      draft.editedHTML = container.innerHTML;
      draft.edited = draft.editedText !== draft.baselineText;
      draft.active = draft.edited;
      highlightFormattedDocumentChanges( container );
      updateFreezeControls();
      updatePromptStatus();
    }

    /**
     * Highlights rendered blocks whose current text is edited or added relative to the draft baseline.
     *
     * @param {HTMLElement} container
     */
    function highlightFormattedDocumentChanges( container ) {
      if ( !container ) {
        return;
      }
      Array.from( container.querySelectorAll( '.formatted-document-change-highlight' ) ).forEach( element => {
        element.classList.remove( 'formatted-document-change-highlight' );
      } );

      const draft = designState.formattedDocumentDraft;
      if ( !draft || !draft.edited || !draft.active || !designState.designModeEnabled ) {
        return;
      }

      const baselineLines = new Set( splitDocumentDiffUnits( draft.baselineText ) );
      getFormattedChangeHighlightBlocks( container ).forEach( block => {
        const blockText = normalizeFormattedBlockText( block );
        if ( blockText && !baselineLines.has( blockText ) ) {
          block.classList.add( 'formatted-document-change-highlight' );
        }
      } );
    }

    /**
     * Gets block-level candidates for formatted document highlighting.
     *
     * @param {HTMLElement} container
     * @returns {HTMLElement[]}
     */
    function getFormattedChangeHighlightBlocks( container ) {
      const selector = 'p, li, h1, h2, h3, h4, h5, h6, button, label, .formatted-related-group, .formatted-group, .formatted-aria-block, .aria-chip';
      const candidates = Array.from( container.querySelectorAll( selector ) )
        .filter( element => normalizeFormattedBlockText( element ).length > 0 );

      return candidates.filter( element => !candidates.some( other => other !== element && element.contains( other ) ) );
    }

    /**
     * Normalizes text from a formatted-view block for baseline comparison.
     *
     * @param {HTMLElement} element
     * @returns {string}
     */
    function normalizeFormattedBlockText( element ) {
      return ( element.innerText || element.textContent || '' )
        .replace( /\u00a0/g, ' ' )
        .replace( /\s+/g, ' ' )
        .trim();
    }

    /**
     * Extracts normalized text from the formatted document editor.
     *
     * @param {HTMLElement|null} container
     * @returns {string}
     */
    function getFormattedDocumentText( container ) {
      if ( !container ) {
        return '';
      }
      const text = container.innerText || container.textContent || '';
      return text.replace( /\u00a0/g, ' ' )
        .split( /\n+/ )
        .map( line => line.replace( /\s+/g, ' ' ).trim() )
        .filter( line => line.length > 0 )
        .join( '\n' );
    }

    /**
     * Determines whether an element should be omitted from the formatted view.
     *
     * @param {HTMLElement} element
     * @returns {boolean}
     */
    function shouldSkipFormattedElement( element ) {
      if ( !element || element.nodeType !== Node.ELEMENT_NODE ) {
        return true;
      }
      if ( element.hidden || element.getAttribute( 'aria-hidden' ) === 'true' ) {
        return true;
      }
      const tagName = element.tagName;
      return tagName === 'SCRIPT' || tagName === 'STYLE' || tagName === 'TEMPLATE';
    }

    /**
     * Recursively walks the PDOM subtree and appends a lightly-processed clone into the formatted container.
     *
     * @param {HTMLElement|DocumentFragment} sourceParent - Node within the live PDOM that we are mirroring.
     * @param {HTMLElement|DocumentFragment} targetParent - Destination container in the formatted view.
     */
    function appendFormattedContent( sourceParent, targetParent ) {
      const nodes = Array.from( sourceParent.childNodes );
      let index = 0;

      while ( index < nodes.length ) {
        const node = nodes[ index ];

        if ( node.nodeType === Node.TEXT_NODE ) {
          appendFormattedTextNode( node, targetParent );
          index++;
          continue;
        }

        if ( node.nodeType !== Node.ELEMENT_NODE ) {
          index++;
          continue;
        }

        const element = node;
        if ( shouldSkipFormattedElement( element ) ) {
          index++;
          continue;
        }

        const headingLevel = getHeadingLevel( element );
        if ( headingLevel !== null ) {
          index = appendHeadingGroup( nodes, index, headingLevel, targetParent );
          continue;
        }

        appendFormattedNode( element, targetParent );
        index++;
      }
    }

    /**
     * Creates a grouped block starting with the heading at startIndex and including following siblings until another
     * heading of the same or higher level appears.
     *
     * @param {Node[]} nodes - Child nodes belonging to the current parent in the source PDOM.
     * @param {number} startIndex - Index of the heading that initiated this group.
     * @param {number} headingLevel - Numeric heading level (1-6) for the initiating heading.
     * @param {HTMLElement|DocumentFragment} targetParent - Destination container for the grouped content.
     * @returns {number} Index of the next node to process in the caller's loop.
     */
    /**
     * Builds the formatted output for a heading. The algorithm first tries to locate a sibling container whose ID
     * shares the heading's related group key and contains the "primary" token. When found, the heading and that
     * container are grouped together, mirroring the logical structure used in the PDOM. If no qualifying sibling is
     * present, we group contiguous content until the next heading of the same or higher level.
     */
    function appendHeadingGroup( nodes, startIndex, headingLevel, targetParent ) {
      if ( headingLevel === 1 ) {
        // Top-level headings always stand alone; they do not own a grouped content block.
        const headingNode = nodes[ startIndex ];
        if ( headingNode && headingNode.nodeType === Node.ELEMENT_NODE && !shouldSkipFormattedElement( headingNode ) ) {
          appendFormattedNode( headingNode, targetParent );
        }
        return startIndex + 1;
      }

      const headingElement = nodes[ startIndex ];
      const headingGroupKey = headingElement && headingElement.nodeType === Node.ELEMENT_NODE ? getRelatedElementGroupKey( headingElement ) : null;
      const primaryIndex = findMatchingPrimarySiblingIndex( nodes, startIndex + 1, headingLevel, headingGroupKey );

      if ( primaryIndex !== null ) {
        const groupEndIndex = extendPrimaryGroupRange( nodes, primaryIndex, headingLevel, headingGroupKey );
        return appendHeadingGroupWithPrimary( nodes, startIndex, groupEndIndex, targetParent );
      }

      // Fall back to structural sections before reverting to heading range grouping.
      const sectionIndex = findFollowingSectionSiblingIndex( nodes, startIndex + 1, headingLevel );
      if ( sectionIndex !== null ) {
        return appendHeadingGroupWithPrimary( nodes, startIndex, sectionIndex, targetParent );
      }

      return appendDefaultHeadingGroup( nodes, startIndex, headingLevel, targetParent );
    }

    /**
     * Groups a heading with the sibling container that carries the "primary" descriptor and the same related group
     * key. Only nodes up to and including the matching container are copied to ensure the formatted view highlights the
     * intended logical section without over-nesting unrelated siblings.
     */
    function appendHeadingGroupWithPrimary( nodes, startIndex, groupEndIndex, targetParent ) {
      const groupContainer = document.createElement( 'div' );
      groupContainer.className = 'formatted-group';

      let index = startIndex;
      while ( index <= groupEndIndex ) {
        const current = nodes[ index ];

        if ( current.nodeType === Node.TEXT_NODE ) {
          appendFormattedTextNode( current, groupContainer );
          index++;
          continue;
        }

        if ( current.nodeType !== Node.ELEMENT_NODE ) {
          index++;
          continue;
        }

        const element = current;
        if ( shouldSkipFormattedElement( element ) ) {
          index++;
          continue;
        }

        appendFormattedNode( element, groupContainer );
        index++;
      }

      if ( groupContainer.childNodes.length > 0 ) {
        targetParent.appendChild( groupContainer );
      }

      return groupEndIndex + 1;
    }

    /**
     * Fallback when no matching primary sibling exists. Continues to collect nodes until the next heading of the same
     * or higher level is encountered.
     *
     * @param {Node[]} nodes
     * @param {number} startIndex
     * @param {number} headingLevel
     * @param {HTMLElement|DocumentFragment} targetParent
     * @returns {number} Index of the next node to process in the caller's loop.
     */
    function appendDefaultHeadingGroup( nodes, startIndex, headingLevel, targetParent ) {
      const groupContainer = document.createElement( 'div' );
      groupContainer.className = 'formatted-group';

      let index = startIndex;
      while ( index < nodes.length ) {
        const current = nodes[ index ];

        if ( current.nodeType === Node.TEXT_NODE ) {
          appendFormattedTextNode( current, groupContainer );
          index++;
          continue;
        }

        if ( current.nodeType !== Node.ELEMENT_NODE ) {
          index++;
          continue;
        }

        const element = current;
        if ( shouldSkipFormattedElement( element ) ) {
          index++;
          continue;
        }

        const currentHeadingLevel = getHeadingLevel( element );
        if ( index !== startIndex && currentHeadingLevel !== null && currentHeadingLevel <= headingLevel ) {
          break;
        }

        appendFormattedNode( element, groupContainer );
        index++;
      }

      if ( groupContainer.childNodes.length > 0 ) {
        targetParent.appendChild( groupContainer );
      }

      return index;
    }

    /**
     * Scans forward from a heading for the first sibling element that:
     *   - is not skipped by the formatted view filters,
     *   - does not introduce a new heading of the same or higher level, and
     *   - shares the heading's related group key while including the "primary" token in its ID.
     * Returning the index of this element lets the caller group only the heading and its authoritative content block.
     */
    function findMatchingPrimarySiblingIndex( nodes, startIndex, headingLevel, headingGroupKey ) {
      if ( headingGroupKey === null ) {
        return null;
      }

      for ( let index = startIndex; index < nodes.length; index++ ) {
        const current = nodes[ index ];

        if ( current.nodeType === Node.TEXT_NODE ) {
          continue;
        }

        if ( current.nodeType !== Node.ELEMENT_NODE ) {
          continue;
        }

        const element = current;
        if ( shouldSkipFormattedElement( element ) ) {
          continue;
        }

        const currentHeadingLevel = getHeadingLevel( element );
        if ( currentHeadingLevel !== null && currentHeadingLevel <= headingLevel ) {
          break;
        }

        const currentGroupKey = getRelatedElementGroupKey( element );
        if ( currentGroupKey === headingGroupKey && element.id && element.id.indexOf( 'primary' ) >= 0 ) {
          return index;
        }
      }

      return null;
    }

    /**
     * Looks for the first meaningful <section> sibling directly following the heading before another heading of the
     * same or higher level appears. Whitespace-only text nodes and skipped elements are ignored so that structural
     * sections adjacent to the heading can be grouped even if formatting inserts extra nodes.
     *
     * @param {Node[]} nodes
     * @param {number} startIndex
     * @param {number} headingLevel
     * @returns {number|null}
     */
    function findFollowingSectionSiblingIndex( nodes, startIndex, headingLevel ) {
      for ( let index = startIndex; index < nodes.length; index++ ) {
        const current = nodes[ index ];

        if ( current.nodeType === Node.TEXT_NODE ) {
          if ( current.textContent && current.textContent.trim().length > 0 ) {
            break;
          }
          continue;
        }

        if ( current.nodeType !== Node.ELEMENT_NODE ) {
          continue;
        }

        const element = current;
        if ( shouldSkipFormattedElement( element ) ) {
          continue;
        }

        const currentHeadingLevel = getHeadingLevel( element );
        if ( currentHeadingLevel !== null && currentHeadingLevel <= headingLevel ) {
          break;
        }

        const tagName = element.tagName.toLowerCase();
        if ( tagName === 'section' ) {
          return index;
        }

        // Keep scanning until we either encounter the next peer heading or exhaust the siblings.
        continue;
      }

      return null;
    }

    /**
     * Extends the primary group range to include additional siblings that share the same related group key, stopping
     * when the next heading (same or higher level) or an unrelated element is encountered.
     *
     * @param {Node[]} nodes
     * @param {number} primaryIndex
     * @param {number} headingLevel
     * @param {string|null} headingGroupKey
     * @returns {number}
     */
    function extendPrimaryGroupRange( nodes, primaryIndex, headingLevel, headingGroupKey ) {
      if ( headingGroupKey === null ) {
        return primaryIndex;
      }

      let lastIndex = primaryIndex;

      for ( let index = primaryIndex + 1; index < nodes.length; index++ ) {
        const current = nodes[ index ];

        if ( current.nodeType === Node.TEXT_NODE ) {
          lastIndex = index;
          continue;
        }

        if ( current.nodeType !== Node.ELEMENT_NODE ) {
          continue;
        }

        const element = current;
        if ( shouldSkipFormattedElement( element ) ) {
          continue;
        }

        const currentHeadingLevel = getHeadingLevel( element );
        if ( currentHeadingLevel !== null && currentHeadingLevel <= headingLevel ) {
          break;
        }

        const currentGroupKey = getRelatedElementGroupKey( element );
        if ( currentGroupKey !== headingGroupKey ) {
          break;
        }

        lastIndex = index;
      }

      return lastIndex;
    }

    /**
     * Clones a PDOM element into the formatted view, skipping decorator elements and removing unwanted styling.
     *
     * @param {HTMLElement} sourceElement - Element from the live PDOM.
     * @param {HTMLElement|DocumentFragment} targetParent - Container in the formatted view.
     */
    function appendFormattedNode( sourceElement, targetParent ) {
      if ( isDecoratorElement( sourceElement ) ) {
        appendFormattedContent( sourceElement, targetParent );
        return;
      }

      const clone = cloneFormattedElement( sourceElement );
      const groupKey = getRelatedElementGroupKey( sourceElement );
      if ( groupKey ) {
        clone.dataset.relatedGroupKey = groupKey;
      }
      targetParent.appendChild( clone );

      if ( groupKey ) {
        const groupInfo = ensureGroupWrapperForClone( clone, groupKey );
        if ( !groupInfo ) {
          attachCloneToExistingGroup( clone, groupKey );
        }
      }

      appendFormattedContent( sourceElement, clone );
      appendFormattedAriaDetails( sourceElement, clone, groupKey );
      finalizeFormattedElement( sourceElement, clone );
    }

    /**
     * Copies a text node into the formatted view, trimming and collapsing whitespace while preserving deliberate
     * leading/trailing spaces.
     *
     * @param {Text} textNode - Source text node from the PDOM.
     * @param {HTMLElement|DocumentFragment} targetParent - Destination container.
     */
    function appendFormattedTextNode( textNode, targetParent ) {
      if ( !textNode ) {
        return;
      }

      const content = textNode.textContent;
      if ( !content ) {
        return;
      }

      const collapsed = content.replace( /\s+/g, ' ' );
      const trimmed = collapsed.trim();
      if ( trimmed.length === 0 ) {
        return;
      }

      const needsLeadingSpace = /^\s/.test( content );
      const needsTrailingSpace = /\s$/.test( content );
      const finalText = `${needsLeadingSpace ? ' ' : ''}${trimmed}${needsTrailingSpace ? ' ' : ''}`;
      const editableText = createEditableDesignTextNode( textNode, finalText );
      targetParent.appendChild( editableText );
    }

    /**
     * Creates the mirrored text for a PDOM text node, applying frozen designer edits when present.
     *
     * @param {Text} textNode
     * @param {string} currentText
     * @returns {HTMLElement|Text}
     */
    function createEditableDesignTextNode( textNode, currentText ) {
      const locator = createTextLocator( textNode, currentText );
      if ( !locator ) {
        return document.createTextNode( currentText );
      }

      return createEditableDesignSpan( locator, currentText, 'design-editable-text' );
    }

    /**
     * Creates an editable span for design prescriptions, keyed by a stable locator.
     *
     * @param {Object} locator
     * @param {string} currentText
     * @param {string} className
     * @returns {HTMLSpanElement}
     */
    function createEditableDesignSpan( locator, currentText, className ) {
      const locatorKey = getLocatorKey( locator );
      designState.activeLocatorKeys.add( locatorKey );

      const span = document.createElement( 'span' );
      span.className = className;
      span.textContent = currentText;
      span.dataset.locatorKey = locatorKey;
      return span;
    }

    /**
     * Creates a shallow clone for a source element, removing inline styling and neutralising focus management.
     *
     * @param {HTMLElement} sourceElement - Element from the live PDOM.
     * @returns {HTMLElement} Shallow clone ready to receive child content.
     */
    function cloneFormattedElement( sourceElement ) {
      const clone = sourceElement.cloneNode( false );
      clone.removeAttribute( 'style' );
      clone.tabIndex = -1;

      // Grouping names assigned in the simulation will not work when all cloned elements are in the same document.
      clone.removeAttribute( 'name' );
      return clone;
    }

    /**
     * Collects ARIA attributes that should be surfaced in the formatted view, respecting per-attribute filters.
     *
     * @param {HTMLElement} element
     * @returns {{ name: string, value: string }[]}
     */
    function collectImportantAriaAttributes( element ) {
      const attributes = [];

      IMPORTANT_ARIA_ATTRIBUTES.forEach( attributeDefinition => {
        const config = typeof attributeDefinition === 'string' ? { name: attributeDefinition } : attributeDefinition;
        const attributeName = config.name;
        const shouldDisplay = config.shouldDisplay;

        if ( element.hasAttribute( attributeName ) ) {
          const value = element.getAttribute( attributeName );

          if ( shouldDisplay && !shouldDisplay( value, element ) ) {
            return;
          }

          attributes.push( {
            name: attributeName,
            value: formatAriaValue( config, value, element )
          } );
        }
      } );

      return attributes;
    }

    /**
     * Appends ARIA attribute chips for the supplied element, either aggregating into a related group wrapper or
     * wrapping the individual clone when no grouping applies.
     *
     * @param {HTMLElement} sourceElement
     * @param {HTMLElement} clone
     * @param {string|null} groupKey
     */
    function appendFormattedAriaDetails( sourceElement, clone, groupKey ) {
      const attributes = collectImportantAriaAttributes( sourceElement );
      if ( attributes.length === 0 ) {
        return;
      }

      const resolvedGroupKey = groupKey || getRelatedElementGroupKey( sourceElement );

      if ( resolvedGroupKey ) {
        const groupInfo = ensureGroupWrapperForClone( clone, resolvedGroupKey );
        if ( !groupInfo ) {
          return;
        }
        const ariaBody = ensureGroupAriaContainer( groupInfo );
        if ( !ariaBody ) {
          return;
        }

        attributes.forEach( attribute => {
          ariaBody.appendChild( createAriaChip( sourceElement, attribute ) );
          groupInfo.attributeCount += 1;
        } );
        updateGroupWrapperDecoration( groupInfo );
        return;
      }

      const parent = clone.parentNode;
      if ( !parent ) {
        return;
      }

      const insertionPoint = clone.nextSibling;

      const wrapper = document.createElement( 'div' );
      wrapper.className = 'formatted-aria-block';

      const ariaContainer = document.createElement( 'div' );
      ariaContainer.className = 'formatted-aria';

      const body = document.createElement( 'div' );
      body.className = 'formatted-aria-body';

      attributes.forEach( attribute => {
        body.appendChild( createAriaChip( sourceElement, attribute ) );
      } );

      ariaContainer.appendChild( body );
      wrapper.appendChild( clone );
      wrapper.appendChild( ariaContainer );

      if ( insertionPoint ) {
        parent.insertBefore( wrapper, insertionPoint );
      }
      else {
        parent.appendChild( wrapper );
      }
    }

    /**
     * Creates an ARIA chip with the attribute value editable in Design Mode.
     *
     * @param {HTMLElement} sourceElement
     * @param {{ name: string, value: string }} attribute
     * @returns {HTMLElement}
     */
    function createAriaChip( sourceElement, attribute ) {
      const chip = document.createElement( 'span' );
      chip.className = 'aria-chip';

      const label = document.createElement( 'span' );
      label.textContent = `${attribute.name}: `;
      chip.appendChild( label );

      const locator = createAttributeLocator( sourceElement, attribute.name );
      const value = createEditableDesignSpan( locator, attribute.value, 'design-editable-text' );
      chip.appendChild( value );
      return chip;
    }

    /**
     * Creates a locator for a text node in the live PDOM.
     *
     * @param {Text} textNode
     * @param {string} currentText
     * @returns {Object|null}
     */
    function createTextLocator( textNode, currentText ) {
      const parentElement = textNode && textNode.parentElement;
      if ( !parentElement ) {
        return null;
      }

      return Object.assign( createElementLocator( parentElement ), {
        kind: 'pdom',
        textIndex: getTextNodeIndex( textNode ),
        textExcerpt: truncateText( currentText, 80 )
      } );
    }

    /**
     * Creates a locator for a PDOM attribute that has user-visible descriptive content.
     *
     * @param {HTMLElement} element
     * @param {string} attributeName
     * @returns {Object}
     */
    function createAttributeLocator( element, attributeName ) {
      return Object.assign( createElementLocator( element ), {
        kind: 'pdomAttribute',
        attributeName: attributeName
      } );
    }

    /**
     * Creates metadata that can help map a prescription back to a live PDOM element.
     *
     * @param {HTMLElement} element
     * @returns {Object}
     */
    function createElementLocator( element ) {
      return {
        tagName: element.tagName.toLowerCase(),
        id: element.id || null,
        role: element.getAttribute( 'role' ),
        ariaLabel: element.getAttribute( 'aria-label' ),
        ariaRoleDescription: element.getAttribute( 'aria-roledescription' ),
        path: getElementPath( element ),
        headingLevel: getHeadingLevel( element ),
        relatedGroupKey: getRelatedElementGroupKey( element )
      };
    }

    /**
     * Builds a path from the PDOM root to the provided element using tag names and sibling positions.
     *
     * @param {HTMLElement} element
     * @returns {string}
     */
    function getElementPath( element ) {
      const parts = [];
      let current = element;
      const pdomRoot = getRenderedPDOMRoot();
      while ( current && current.nodeType === Node.ELEMENT_NODE && current !== pdomRoot ) {
        const parent = current.parentElement;
        const tagName = current.tagName.toLowerCase();
        const sameTagIndex = parent ?
                             Array.from( parent.children ).filter( sibling => sibling.tagName === current.tagName ).indexOf( current ) :
                             0;
        parts.unshift( `${tagName}[${sameTagIndex}]` );
        current = parent;
      }
      return parts.join( '/' );
    }

    /**
     * Returns the index of a text node among meaningful text-node siblings.
     *
     * @param {Text} textNode
     * @returns {number}
     */
    function getTextNodeIndex( textNode ) {
      const parent = textNode.parentNode;
      if ( !parent ) {
        return 0;
      }
      return Array.from( parent.childNodes )
        .filter( node => node.nodeType === Node.TEXT_NODE && ( node.textContent || '' ).trim().length > 0 )
        .indexOf( textNode );
    }

    /**
     * Creates the registry key for a locator.
     *
     * @param {Object} locator
     * @returns {string}
     */
    function getLocatorKey( locator ) {
      if ( locator.id ) {
        return `${locator.kind}:${locator.id}:${locator.attributeName || ''}:${locator.textIndex || 0}`;
      }
      return JSON.stringify( locator );
    }

    /**
     * Truncates text for locator context.
     *
     * @param {string} text
     * @param {number} length
     * @returns {string}
     */
    function truncateText( text, length ) {
      return text.length <= length ? text : `${text.slice( 0, length - 1 )}...`;
    }

    /**
     * Updates the stale edits section with frozen edits whose source locator is no longer in the rendered PDOM view.
     */
    function updateStaleEditSection() {
      const container = domReferences.staleEditsContainer;
      const list = domReferences.staleEditsList;
      if ( !container || !list ) {
        return;
      }

      list.innerHTML = '';
      const staleEntries = Array.from( designState.editRegistry.entries() ).filter( entry => {
        const locatorKey = entry[ 0 ];
        const edit = entry[ 1 ];
        const activeKey = edit.anchorLocatorKey || locatorKey;
        return edit.edited && !designState.activeLocatorKeys.has( activeKey );
      } );

      container.hidden = staleEntries.length === 0;
      staleEntries.forEach( entry => {
        const edit = entry[ 1 ];
        const item = document.createElement( 'div' );
        item.className = 'stale-edit-item';

        const label = document.createElement( 'span' );
        label.className = 'stale-edit-label';
        const locator = edit.locator || edit.anchorLocator || {};
        label.textContent = `${edit.operation} ${locator.kind || ''} ${locator.tagName || ''} ${locator.id || locator.path || ''}`;
        item.appendChild( label );

        const text = document.createElement( 'div' );
        text.textContent = edit.prescribedText;
        item.appendChild( text );
        list.appendChild( item );
      } );
    }

    /**
     * Performs post-recursion adjustments that require access to the source element's descendants (e.g. option state).
     *
     * @param {HTMLElement} sourceElement
     * @param {HTMLElement} clone
     */
    function finalizeFormattedElement( sourceElement, clone ) {
      const tagName = sourceElement.tagName.toLowerCase();

      if ( tagName === 'select' ) {
        clone.selectedIndex = sourceElement.selectedIndex;
        return;
      }

      if ( tagName === 'option' ) {
        if ( sourceElement.selected ) {
          clone.selected = true;
        }
        return;
      }

      if ( tagName === 'textarea' ) {
        clone.value = sourceElement.value || sourceElement.textContent || '';
      }
    }

    /**
     * Extracts the heading level if the element is a native HTML heading tag (h1-h6).
     *
     * @param {HTMLElement} element
     * @returns {number|null}
     */
    function getHeadingLevel( element ) {
      const tagName = element.tagName.toLowerCase();
      if ( /^h[1-6]$/.test( tagName ) ) {
        return Number( tagName.charAt( 1 ) );
      }

      return null;
    }

    /**
     * Determines whether an element exists purely for structure and should be flattened in the formatted view.
     *
     * @param {HTMLElement} element
     * @returns {boolean}
     */
    function isDecoratorElement( element ) {
      return DECORATOR_TAGS.has( element.tagName );
    }

    // --- Related group helpers

    /**
     * Derives a grouping key for related elements by removing the final descriptor token before the trailing numeric
     * path in an element ID. This keeps label/control/heading/description sets with matching scene-graph paths
     * visually connected in the formatted view. The resulting key is effectively the element's trail identifier in the
     * scenery scene graph, so every accessible piece produced by the same Node shares the same key.
     *
     * @param {HTMLElement} element
     * @returns {string|null}
     */
    function getRelatedElementGroupKey( element ) {
      if ( !element || !element.id ) {
        return null;
      }
      const tokens = element.id.split( '-' );
      if ( tokens.length < 3 ) {
        return null;
      }

      let numericStart = tokens.length;
      while ( numericStart > 0 && /^\d+$/.test( tokens[ numericStart - 1 ] ) ) {
        numericStart--;
      }

      if ( numericStart === tokens.length ) {
        return null;
      }

      const numericTokens = tokens.slice( numericStart );
      const descriptorIndex = numericStart - 1;
      if ( descriptorIndex < 0 ) {
        return null;
      }

      const baseTokens = tokens.slice( 0, descriptorIndex );
      if ( baseTokens.length === 0 ) {
        return null;
      }

      const basePrefix = baseTokens.join( '-' );
      const numericSuffix = numericTokens.join( '-' );
      return `${basePrefix}-${numericSuffix}`;
    }

    /**
     * Updates styling for a related group wrapper based on its member count.
     *
     * @param {{ wrapper: HTMLElement, elementCount: number }} groupInfo
     */
    function updateGroupWrapperState( groupInfo ) {
      if ( !groupInfo || !groupInfo.wrapper ) {
        return;
      }
      const hasMultiple = ( groupInfo.elementCount || 0 ) > 1;
      groupInfo.wrapper.classList.toggle( 'formatted-related-group--multi', hasMultiple );
    }

    /**
     * Toggles visual decoration (dashed borders) for a group wrapper based on whether it is grouping multiple elements
     * or carrying ARIA metadata.
     *
     * @param {{ wrapper: HTMLElement, elementCount: number, attributeCount: number }} groupInfo
     */
    function updateGroupWrapperDecoration( groupInfo ) {
      if ( !groupInfo || !groupInfo.wrapper ) {
        return;
      }
      // Only show the dashed boundary when we actually have multiple related nodes or ARIA chips to display.
      const hasGroupingDecoration = ( groupInfo.elementCount || 0 ) > 1 || ( groupInfo.attributeCount || 0 ) > 0;
      groupInfo.wrapper.classList.toggle( 'formatted-aria-block', hasGroupingDecoration );
    }

    /**
     * Returns whether the node should be counted as part of a related group for visual decoration.
     *
     * @param {Node} node
     * @param {string|null} groupKey
     * @returns {boolean}
     */
    function shouldCountGroupNode( node, groupKey ) {
      return !!( node &&
                 groupKey &&
                 node.nodeType === Node.ELEMENT_NODE &&
                 node.dataset &&
                 node.dataset.relatedGroupKey === groupKey &&
                 !( node instanceof HTMLElement && node.classList.contains( 'formatted-aria' ) ) );
    }

    /**
     * Appends a node to the appropriate location in a related group wrapper, ensuring ARIA details remain last.
     *
     * @param {{ wrapper: HTMLElement, ariaContainer: HTMLElement|null }} groupInfo
     * @param {HTMLElement} node
     */
    function addNodeToGroupWrapper( groupInfo, node ) {
      if ( !groupInfo || !node ) {
        return;
      }
      const wrapper = groupInfo.wrapper;
      if ( !wrapper || wrapper === node ) {
        return;
      }

      const memberCount = shouldCountGroupNode( node, groupInfo.groupKey ) ? 1 : 0;

      if ( wrapper.contains( node ) ) {
        if ( memberCount > 0 ) {
          groupInfo.elementCount += memberCount;
          updateGroupWrapperState( groupInfo );
          updateGroupWrapperDecoration( groupInfo );
        }
        return;
      }

      if ( node.contains( wrapper ) ) {
        const parent = node.parentNode;
        if ( parent ) {
          parent.insertBefore( wrapper, node );
        }
        else {
          return;
        }
      }

      const insertionPoint = groupInfo.ariaContainer;
      if ( insertionPoint ) {
        wrapper.insertBefore( node, insertionPoint );
      }
      else {
        wrapper.appendChild( node );
      }

      if ( memberCount > 0 ) {
        groupInfo.elementCount += memberCount;
        updateGroupWrapperState( groupInfo );
        updateGroupWrapperDecoration( groupInfo );
      }
    }

    /**
     * If a related group already exists for the key, moves the clone into it.
     *
     * @param {HTMLElement} clone
     * @param {string|null} groupKey
     */
    function attachCloneToExistingGroup( clone, groupKey ) {
      if ( !clone || !groupKey || !relatedGroupWrappers ) {
        return;
      }
      const groupInfo = relatedGroupWrappers.get( groupKey );
      if ( !groupInfo ) {
        return;
      }
      addNodeToGroupWrapper( groupInfo, clone );
    }

    /**
     * Ensures a wrapper exists for the supplied clone and group key, moving any already-rendered related elements
     * into the wrapper in document order.
     *
     * @param {HTMLElement} clone
     * @param {string|null} groupKey
     * @returns {{ wrapper: HTMLElement, ariaContainer: HTMLElement|null, ariaBody: HTMLElement|null, attributeCount: number, elementCount: number, groupKey: string|null }|null}
     */
    function ensureGroupWrapperForClone( clone, groupKey ) {
      if ( !clone || !groupKey || !relatedGroupWrappers ) {
        return null;
      }

      let groupInfo = relatedGroupWrappers.get( groupKey );
      if ( groupInfo ) {
        if ( !groupInfo.groupKey ) {
          groupInfo.groupKey = groupKey;
        }
        addNodeToGroupWrapper( groupInfo, clone );
        return groupInfo;
      }

      const parent = clone.parentNode;
      if ( !parent ) {
        return null;
      }

      const wrapper = document.createElement( 'div' );
      wrapper.className = 'formatted-related-group';
      parent.insertBefore( wrapper, clone );

      let elementCount = 0;
      const siblings = Array.from( parent.childNodes );
      siblings.forEach( node => {
        if ( node === wrapper ) {
          return;
        }
        if ( node.nodeType === Node.ELEMENT_NODE &&
             node.dataset &&
             node.dataset.relatedGroupKey === groupKey ) {
          wrapper.appendChild( node );
          if ( shouldCountGroupNode( node, groupKey ) ) {
            elementCount += 1;
          }
        }
      } );

      groupInfo = {
        wrapper: wrapper,
        ariaContainer: null,
        ariaBody: null,
        attributeCount: 0,
        elementCount: elementCount,
        groupKey: groupKey
      };
      relatedGroupWrappers.set( groupKey, groupInfo );
      updateGroupWrapperState( groupInfo );
      updateGroupWrapperDecoration( groupInfo );
      return groupInfo;
    }

    /**
     * Ensures the ARIA details container exists for a related group, creating it on demand.
     *
     * @param {{ wrapper: HTMLElement, ariaContainer: HTMLElement|null, ariaBody: HTMLElement|null, attributeCount: number, elementCount: number, groupKey: string|null }} groupInfo
     * @returns {HTMLElement|null}
     */
    function ensureGroupAriaContainer( groupInfo ) {
      if ( !groupInfo ) {
        return null;
      }
      if ( groupInfo.ariaContainer ) {
        return groupInfo.ariaBody;
      }

      const ariaContainer = document.createElement( 'div' );
      ariaContainer.className = 'formatted-aria';

      const body = document.createElement( 'div' );
      body.className = 'formatted-aria-body';
      ariaContainer.appendChild( body );

      groupInfo.wrapper.appendChild( ariaContainer );
      groupInfo.ariaContainer = ariaContainer;
      groupInfo.ariaBody = body;
      groupInfo.attributeCount = 0;
      return body;
    }

    /**
     * Renders the formatted state-description view with up-to-date content.
     *
     * @param {HTMLElement} pdomRoot
     * @param {{ formatted: HTMLElement|null }} viewContainers
     * @param {{ formatted: Function }} renderers
     */
    function renderViews( pdomRoot, viewContainers, renderers ) {
      const formattedRenderer = renderers && renderers.formatted;
      if ( typeof formattedRenderer !== 'function' ) {
        return;
      }

      // Make the current PDOM root available to relationship formatters while we render the view.
      RELATIONSHIP_LOOKUP_ROOT = pdomRoot || null;
      try {
        formattedRenderer( pdomRoot, viewContainers.formatted );
      }
      finally {
        RELATIONSHIP_LOOKUP_ROOT = null;
      }
    }

    /**
     * Reads the active ScreenView's optional accessible view state and renders it as formatted JSON.
     *
     * @param {Window|null} innerWindow
     * @param {HTMLElement|null} container
     */
    function renderAccessibleViewState( innerWindow, container ) {
      if ( !container ) {
        return;
      }

      try {
        const sim = innerWindow &&
                    innerWindow.phet &&
                    innerWindow.phet.joist &&
                    innerWindow.phet.joist.sim;
        const candidates = getAccessibleViewStateScreenCandidates( sim );
        const errors = [];

        for ( let i = 0; i < candidates.length; i++ ) {
          const screen = candidates[ i ];
          if ( !screen ) {
            continue;
          }

          try {
            const view = screen.view;
            if ( !view || typeof view.getAccessibleViewState !== 'function' ) {
              continue;
            }

            const accessibleViewState = view.getAccessibleViewState();
            if ( accessibleViewState === null || typeof accessibleViewState === 'undefined' ) {
              continue;
            }
            renderAccessibleViewStateValue( accessibleViewState, container );
            return;
          }
          catch( e ) {
            errors.push( e );
          }
        }

        container.textContent = errors.length > 0 ?
                                `Error reading accessible view state: ${errors[ 0 ] && errors[ 0 ].message ? errors[ 0 ].message : errors[ 0 ]}` :
                                NO_ACCESSIBLE_VIEW_STATE_MESSAGE;
      }
      catch( e ) {
        container.textContent = `Error reading accessible view state: ${e && e.message ? e.message : e}`;
      }
    }

    /**
     * Renders an accessible view state object as formatted JSON.
     *
     * @param {*} accessibleViewState
     * @param {HTMLElement|null} container
     */
    function renderAccessibleViewStateValue( accessibleViewState, container ) {
      if ( !container ) {
        return;
      }

      const formattedState = accessibleViewState === null || typeof accessibleViewState === 'undefined' ?
                             null :
                             JSON.stringify( accessibleViewState, null, 2 );
      if ( typeof formattedState === 'string' ) {
        container.innerHTML = syntaxHighlightJSON( formattedState );
      }
      else {
        container.textContent = NO_ACCESSIBLE_VIEW_STATE_MESSAGE;
      }
    }

    /**
     * Escapes HTML characters before inserting generated JSON markup.
     *
     * @param {string} text
     * @returns {string}
     */
    function escapeHTML( text ) {
      return text.replace( /[&<>]/g, character => {
        return character === '&' ? '&amp;' :
               character === '<' ? '&lt;' :
               '&gt;';
      } );
    }

    /**
     * Adds lightweight syntax highlighting to formatted JSON.
     *
     * @param {string} json
     * @returns {string}
     */
    function syntaxHighlightJSON( json ) {
      return escapeHTML( json ).replace(
        /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+-]?\d+)?)/g,
        match => {
          const className = /^"/.test( match ) ? /:$/.test( match ) ? 'json-key' : 'json-string' :
                            match === 'true' || match === 'false' ? 'json-boolean' :
                            match === 'null' ? 'json-null' :
                            'json-number';
          return `<span class="${className}">${match}</span>`;
        }
      );
    }

    /**
     * Gets screen candidates that may own the current authored accessible view state, ordered from most to least
     * specific. The Home screen can be the selected joist screen while its model still tracks a selected sim screen
     * for navigation-preview state, so that screen is checked before broader fallbacks.
     *
     * @param {Object|null} sim
     * @returns {Object[]}
     */
    function getAccessibleViewStateScreenCandidates( sim ) {
      if ( !sim ) {
        return [];
      }

      const candidates = [];
      addUniqueScreenCandidate( candidates, sim.selectedScreenProperty && sim.selectedScreenProperty.value );
      addUniqueScreenCandidate(
        candidates,
        sim.homeScreen &&
        sim.homeScreen.model &&
        sim.homeScreen.model.selectedScreenProperty &&
        sim.homeScreen.model.selectedScreenProperty.value
      );

      const screens = Array.isArray( sim.screens ) ? sim.screens : [];
      screens.forEach( screen => {
        const hasView = !screen || typeof screen.hasView !== 'function' || screen.hasView();
        if ( screen && hasView && screen.view && typeof screen.view.isVisible === 'function' && screen.view.isVisible() ) {
          addUniqueScreenCandidate( candidates, screen );
        }
      } );
      screens.forEach( screen => {
        const hasView = !screen || typeof screen.hasView !== 'function' || screen.hasView();
        if ( screen &&
             hasView &&
             screen.activeProperty &&
             screen.activeProperty.value &&
             screen !== sim.homeScreen ) {
          addUniqueScreenCandidate( candidates, screen );
        }
      } );

      return candidates;
    }

    /**
     * Adds a screen to the ordered candidate list if it is available and not already present.
     *
     * @param {Object[]} candidates
     * @param {Object|null} screen
     */
    function addUniqueScreenCandidate( candidates, screen ) {
      if ( screen && candidates.indexOf( screen ) < 0 ) {
        candidates.push( screen );
      }
    }

    /**
     * Creates an implementation-ready prescription record from the current state-description edits.
     *
     * @returns {Object|null}
     */
    function createStateDescriptionPrescriptionRecord() {
      const snapshot = designState.isFrozen && designState.frozenSnapshot ?
                       designState.frozenSnapshot :
                       captureDesignSnapshot();
      if ( !snapshot ) {
        return null;
      }

      return {
        schemaVersion: PRESCRIPTION_SCHEMA_VERSION,
        type: 'stateDescriptionPrescriptions',
        timestamp: new Date().toISOString(),
        sim: getSimMetadata(),
        stateContext: formatStateContext( snapshot ),
        formattedViewEdit: getFormattedViewEditForExport(),
        prescriptions: getEditedDescriptionPrescriptions()
      };
    }

    /**
     * Creates a response prescription record from a response and before/after snapshots.
     *
     * @param {Object|null} beforeSnapshot
     * @param {Object} afterSnapshot
     * @param {string} beforeText
     * @param {string} category
     * @param {string} operation
     * @param {string} prescribedText
     * @returns {Object}
     */
    function createContextResponsePrescriptionRecord( beforeSnapshot, afterSnapshot, beforeText, category, operation, prescribedText ) {
      return {
        schemaVersion: PRESCRIPTION_SCHEMA_VERSION,
        type: 'contextResponsePrescription',
        timestamp: new Date().toISOString(),
        sim: getSimMetadata(),
        stateDelta: createStateDelta( beforeSnapshot, afterSnapshot ),
        response: {
          operation: operation,
          category: category,
          beforeText: beforeText,
          prescribedText: prescribedText
        }
      };
    }

    /**
     * Captures the wrapper's current design-relevant state. This intentionally omits screenshots; daemon-backed disk
     * capture can add those later without bloating Codex-ready prescriptions.
     *
     * @returns {Object|null}
     */
    function captureDesignSnapshot( pdomRoot = designState.pdomRoot ) {
      const innerWindow = designState.innerWindow;
      if ( !pdomRoot || !innerWindow ) {
        return null;
      }

      return {
        accessibleViewState: cloneSnapshotValue( getAccessibleViewStateValue( innerWindow ) ),
        pdomText: getElementTextSnapshot( pdomRoot ),
        visibleText: cloneSnapshotValue( collectVisibleSceneryText( innerWindow ) ),
        focus: cloneSnapshotValue( getFocusMetadata( innerWindow ) ),
        recentResponses: designState.recentResponses.slice( -10 )
      };
    }

    /**
     * Clones JSON-compatible snapshot content so frozen snapshots do not track later live mutations.
     *
     * @param {*} value
     * @returns {*}
     */
    function cloneSnapshotValue( value ) {
      if ( value === null || typeof value === 'undefined' ) {
        return value;
      }

      try {
        return JSON.parse( JSON.stringify( value ) );
      }
      catch( e ) {
        return value;
      }
    }

    /**
     * Reads the active accessible view state object without rendering it.
     *
     * @param {Window|null} innerWindow
     * @returns {Object|null}
     */
    function getAccessibleViewStateValue( innerWindow ) {
      const sim = getSim( innerWindow );
      const candidates = getAccessibleViewStateScreenCandidates( sim );

      for ( let i = 0; i < candidates.length; i++ ) {
        const screen = candidates[ i ];
        if ( !screen || !screen.view || typeof screen.view.getAccessibleViewState !== 'function' ) {
          continue;
        }

        try {
          const accessibleViewState = screen.view.getAccessibleViewState();
          if ( accessibleViewState !== null && typeof accessibleViewState !== 'undefined' ) {
            return accessibleViewState;
          }
        }
        catch( e ) {
          // Keep trying less specific candidates.
        }
      }

      return null;
    }

    /**
     * Returns the live Sim instance from the iframe window.
     *
     * @param {Window|null} innerWindow
     * @returns {Object|null}
     */
    function getSim( innerWindow ) {
      return innerWindow &&
             innerWindow.phet &&
             innerWindow.phet.joist &&
             innerWindow.phet.joist.sim ?
             innerWindow.phet.joist.sim :
             null;
    }

    /**
     * Captures basic sim/screen metadata for exported prescriptions.
     *
     * @returns {Object}
     */
    function getSimMetadata() {
      const innerWindow = designState.innerWindow;
      const sim = getSim( innerWindow );
      const screens = sim && Array.isArray( sim.screens ) ? sim.screens : [];
      const selectedScreen = sim && sim.selectedScreenProperty ? sim.selectedScreenProperty.value : null;
      const screenIndex = selectedScreen ? screens.indexOf( selectedScreen ) : -1;
      const screenName = selectedScreen && selectedScreen.nameProperty ? selectedScreen.nameProperty.value :
                         selectedScreen && selectedScreen.name ? selectedScreen.name :
                         null;

      return {
        repo: queryParameters.get( 'sim' ) || getRepoFromIframeURL(),
        url: domReferences.iframe ? domReferences.iframe.src : '',
        screenIndex: screenIndex >= 0 ? screenIndex : null,
        screenName: screenName
      };
    }

    /**
     * Best-effort repository name extraction for built wrappers or missing query parameters.
     *
     * @returns {string|null}
     */
    function getRepoFromIframeURL() {
      if ( !domReferences.iframe || !domReferences.iframe.src ) {
        return null;
      }
      const match = domReferences.iframe.src.match( /\/([^/?#]+)\/\1_(?:en|all)(?:_phet)?\.html/ );
      return match ? match[ 1 ] : null;
    }

    /**
     * Returns text content from an element with whitespace normalized.
     *
     * @param {HTMLElement} element
     * @returns {string}
     */
    function getElementTextSnapshot( element ) {
      return ( element.innerText || element.textContent || '' ).replace( /\s+/g, ' ' ).trim();
    }

    /**
     * Best-effort scrape of visible Scenery Text nodes.
     *
     * @param {Window} innerWindow
     * @returns {Object[]}
     */
    function collectVisibleSceneryText( innerWindow ) {
      const sim = getSim( innerWindow );
      const rootNode = sim && sim.rootNode;
      const visibleText = [];
      const visited = new Set();

      const visit = node => {
        if ( !node || visited.has( node ) ) {
          return;
        }
        visited.add( node );

        try {
          if ( typeof node.isVisible === 'function' && !node.isVisible() ) {
            return;
          }
        }
        catch( e ) {
          // continue best-effort traversal
        }

        const text = getSceneryNodeText( node );
        if ( text ) {
          visibleText.push( {
            text: text,
            tandemName: node.tandem && node.tandem.name ? node.tandem.name : null,
            phetioID: node.tandem && typeof node.tandem.phetioID === 'string' ? node.tandem.phetioID : null
          } );
        }

        const children = typeof node.getChildren === 'function' ? node.getChildren() :
                         Array.isArray( node.children ) ? node.children :
                         Array.isArray( node._children ) ? node._children :
                           [];
        children.forEach( visit );
      };

      visit( rootNode );
      return visibleText;
    }

    /**
     * Reads visible text from common Scenery Text-node APIs.
     *
     * @param {Object} node
     * @returns {string|null}
     */
    function getSceneryNodeText( node ) {
      try {
        const text = typeof node.getString === 'function' ? node.getString() :
                     typeof node.string === 'string' ? node.string :
                     node.stringProperty && typeof node.stringProperty.value === 'string' ? node.stringProperty.value :
                     null;
        return text && text.trim().length > 0 ? text : null;
      }
      catch( e ) {
        return null;
      }
    }

    /**
     * Captures focused element metadata from the iframe PDOM.
     *
     * @param {Window} innerWindow
     * @returns {Object}
     */
    function getFocusMetadata( innerWindow ) {
      const activeElement = innerWindow && innerWindow.document ? innerWindow.document.activeElement : null;
      if ( !activeElement || activeElement === innerWindow.document.body ) {
        return {};
      }
      return {
        tagName: activeElement.tagName ? activeElement.tagName.toLowerCase() : null,
        id: activeElement.id || null,
        role: activeElement.getAttribute ? activeElement.getAttribute( 'role' ) : null,
        ariaLabel: activeElement.getAttribute ? activeElement.getAttribute( 'aria-label' ) : null,
        text: getElementTextSnapshot( activeElement )
      };
    }

    /**
     * Formats a compact state context for state-description prescriptions.
     *
     * @param {Object} snapshot
     * @returns {Object}
     */
    function formatStateContext( snapshot ) {
      return {
        focus: snapshot.focus,
        pdomText: truncateText( snapshot.pdomText || '', 4000 ),
        visibleText: snapshot.visibleText.slice( 0, 80 ),
        accessibleViewStateSummary: createAccessibleViewStateSummary( snapshot.accessibleViewState )
      };
    }

    /**
     * Creates a compact before/after diff for context-response implementation.
     *
     * @param {Object|null} beforeSnapshot
     * @param {Object|null} afterSnapshot
     * @returns {Object}
     */
    function createStateDelta( beforeSnapshot, afterSnapshot ) {
      return {
        focus: {
          before: beforeSnapshot ? beforeSnapshot.focus : {},
          after: afterSnapshot ? afterSnapshot.focus : {}
        },
        accessibleViewStateChangedPaths: createObjectDiff( beforeSnapshot && beforeSnapshot.accessibleViewState, afterSnapshot && afterSnapshot.accessibleViewState, 80 ),
        pdomTextAdded: diffTextTokens( beforeSnapshot ? beforeSnapshot.pdomText : '', afterSnapshot ? afterSnapshot.pdomText : '' ).added,
        pdomTextRemoved: diffTextTokens( beforeSnapshot ? beforeSnapshot.pdomText : '', afterSnapshot ? afterSnapshot.pdomText : '' ).removed,
        visibleTextAdded: diffVisibleText( beforeSnapshot ? beforeSnapshot.visibleText : [], afterSnapshot ? afterSnapshot.visibleText : [] ).added,
        visibleTextRemoved: diffVisibleText( beforeSnapshot ? beforeSnapshot.visibleText : [], afterSnapshot ? afterSnapshot.visibleText : [] ).removed
      };
    }

    /**
     * Creates a shallow summary of accessible view state keys and short primitive values.
     *
     * @param {Object|null} accessibleViewState
     * @returns {Object|null}
     */
    function createAccessibleViewStateSummary( accessibleViewState ) {
      if ( !accessibleViewState || typeof accessibleViewState !== 'object' ) {
        return accessibleViewState || null;
      }

      const summary = {};
      Object.keys( accessibleViewState ).slice( 0, 40 ).forEach( key => {
        const value = accessibleViewState[ key ];
        summary[ key ] = typeof value === 'string' ? truncateText( value, 240 ) :
                         typeof value === 'number' || typeof value === 'boolean' || value === null ? value :
                         Array.isArray( value ) ? `[array:${value.length}]` :
                         typeof value === 'object' ? `[object:${Object.keys( value ).length}]` :
                         String( value );
      } );
      return summary;
    }

    /**
     * Computes changed primitive/object paths between two objects.
     *
     * @param {*} beforeValue
     * @param {*} afterValue
     * @param {number} limit
     * @param {string} path
     * @returns {Object[]}
     */
    function createObjectDiff( beforeValue, afterValue, limit, path = '' ) {
      const diffs = [];
      appendObjectDiffs( diffs, beforeValue, afterValue, limit, path );
      return diffs;
    }

    /**
     * Recursive implementation for createObjectDiff.
     *
     * @param {Object[]} diffs
     * @param {*} beforeValue
     * @param {*} afterValue
     * @param {number} limit
     * @param {string} path
     */
    function appendObjectDiffs( diffs, beforeValue, afterValue, limit, path ) {
      if ( diffs.length >= limit ) {
        return;
      }
      if ( JSON.stringify( beforeValue ) === JSON.stringify( afterValue ) ) {
        return;
      }
      const beforeIsObject = beforeValue && typeof beforeValue === 'object';
