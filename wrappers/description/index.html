      const afterIsObject = afterValue && typeof afterValue === 'object';
      if ( !beforeIsObject || !afterIsObject || Array.isArray( beforeValue ) || Array.isArray( afterValue ) ) {
        diffs.push( {
          path: path || '$',
          before: compactDiffValue( beforeValue ),
          after: compactDiffValue( afterValue )
        } );
        return;
      }

      const keys = Array.from( new Set( [ ...Object.keys( beforeValue ), ...Object.keys( afterValue ) ] ) ).sort();
      keys.forEach( key => {
        appendObjectDiffs( diffs, beforeValue[ key ], afterValue[ key ], limit, path ? `${path}.${key}` : key );
      } );
    }

    /**
     * Compacts a value for state diffs.
     *
     * @param {*} value
     * @returns {*}
     */
    function compactDiffValue( value ) {
      if ( typeof value === 'string' ) {
        return truncateText( value, 300 );
      }
      if ( Array.isArray( value ) ) {
        return value.slice( 0, 8 ).map( compactDiffValue );
      }
      if ( value && typeof value === 'object' ) {
        return truncateText( JSON.stringify( value ), 500 );
      }
      return typeof value === 'undefined' ? null : value;
    }

    /**
     * Computes added and removed sentence-like chunks between two text snapshots.
     *
     * @param {string} beforeText
     * @param {string} afterText
     * @returns {{ added: string[], removed: string[] }}
     */
    function diffTextTokens( beforeText, afterText ) {
      const beforeTokens = tokenizeSnapshotText( beforeText );
      const afterTokens = tokenizeSnapshotText( afterText );
      const beforeSet = new Set( beforeTokens );
      const afterSet = new Set( afterTokens );
      return {
        added: afterTokens.filter( token => !beforeSet.has( token ) ).slice( 0, 40 ),
        removed: beforeTokens.filter( token => !afterSet.has( token ) ).slice( 0, 40 )
      };
    }

    /**
     * Splits snapshot text into reusable sentence-ish chunks.
     *
     * @param {string} text
     * @returns {string[]}
     */
    function tokenizeSnapshotText( text ) {
      return ( text || '' )
        .split( /(?<=[.!?])\s+|\n+/ )
        .map( token => token.replace( /\s+/g, ' ' ).trim() )
        .filter( token => token.length > 0 && token.length < 500 );
    }

    /**
     * Diffs visible Scenery text entries by their text.
     *
     * @param {Object[]} beforeVisibleText
     * @param {Object[]} afterVisibleText
     * @returns {{ added: Object[], removed: Object[] }}
     */
    function diffVisibleText( beforeVisibleText, afterVisibleText ) {
      const beforeTexts = new Set( beforeVisibleText.map( entry => entry.text ) );
      const afterTexts = new Set( afterVisibleText.map( entry => entry.text ) );
      return {
        added: afterVisibleText.filter( entry => !beforeTexts.has( entry.text ) ).slice( 0, 40 ),
        removed: beforeVisibleText.filter( entry => !afterTexts.has( entry.text ) ).slice( 0, 40 )
      };
    }

    /**
     * Gets the document-level formatted-view edit for export.
     *
     * @returns {Object|null}
     */
    function getFormattedViewEditForExport() {
      const draft = designState.formattedDocumentDraft;
      if ( !draft || !draft.edited ) {
        return null;
      }

      return {
        beforeText: truncateText( draft.baselineText, 12000 ),
        afterText: truncateText( draft.editedText, 12000 ),
        diff: createOrderedTextDiff( draft.baselineText, draft.editedText, 120 )
      };
    }

    /**
     * Creates an ordered text diff suitable for implementation prompts.
     *
     * @param {string} beforeText
     * @param {string} afterText
     * @param {number} limit
     * @returns {Object[]}
     */
    function createOrderedTextDiff( beforeText, afterText, limit ) {
      const beforeUnits = splitDocumentDiffUnits( beforeText );
      const afterUnits = splitDocumentDiffUnits( afterText );

      if ( beforeUnits.length * afterUnits.length > 40000 ) {
        const tokenDiff = diffTextTokens( beforeText, afterText );
        return [
          ...tokenDiff.removed.map( text => ( { operation: 'remove', text: text } ) ),
          ...tokenDiff.added.map( text => ( { operation: 'add', text: text } ) )
        ].slice( 0, limit );
      }

      const table = [];
      for ( let i = 0; i <= beforeUnits.length; i++ ) {
        table[ i ] = new Array( afterUnits.length + 1 ).fill( 0 );
      }

      for ( let i = beforeUnits.length - 1; i >= 0; i-- ) {
        for ( let j = afterUnits.length - 1; j >= 0; j-- ) {
          table[ i ][ j ] = beforeUnits[ i ] === afterUnits[ j ] ?
                            table[ i + 1 ][ j + 1 ] + 1 :
                            Math.max( table[ i + 1 ][ j ], table[ i ][ j + 1 ] );
        }
      }

      const diff = [];
      let beforeIndex = 0;
      let afterIndex = 0;
      while ( beforeIndex < beforeUnits.length || afterIndex < afterUnits.length ) {
        if ( beforeIndex < beforeUnits.length &&
             afterIndex < afterUnits.length &&
             beforeUnits[ beforeIndex ] === afterUnits[ afterIndex ] ) {
          beforeIndex++;
          afterIndex++;
          continue;
        }

        if ( afterIndex >= afterUnits.length ||
             ( beforeIndex < beforeUnits.length &&
               table[ beforeIndex + 1 ][ afterIndex ] >= table[ beforeIndex ][ afterIndex + 1 ] ) ) {
          appendDiffUnit( diff, 'remove', beforeUnits[ beforeIndex ] );
          beforeIndex++;
        }
        else {
          appendDiffUnit( diff, 'add', afterUnits[ afterIndex ] );
          afterIndex++;
        }

        if ( diff.length >= limit ) {
          break;
        }
      }

      return diff;
    }

    /**
     * Splits document text into stable diff units, preferring rendered lines and falling back to sentence-like chunks.
     *
     * @param {string} text
     * @returns {string[]}
     */
    function splitDocumentDiffUnits( text ) {
      const lines = ( text || '' )
        .split( /\n+/ )
        .map( line => line.replace( /\s+/g, ' ' ).trim() )
        .filter( line => line.length > 0 );
      return lines.length > 1 ? lines : tokenizeSnapshotText( text );
    }

    /**
     * Adds a unit to a diff, merging adjacent operations of the same type.
     *
     * @param {Object[]} diff
     * @param {string} operation
     * @param {string} text
     */
    function appendDiffUnit( diff, operation, text ) {
      if ( !text ) {
        return;
      }
      const previous = diff[ diff.length - 1 ];
      if ( previous && previous.operation === operation ) {
        previous.text = `${previous.text}\n${text}`;
      }
      else {
        diff.push( {
          operation: operation,
          text: text
        } );
      }
    }

    /**
     * Gets all edited state-description prescriptions for capture/export.
     *
     * @returns {Object[]}
     */
    function getEditedDescriptionPrescriptions() {
      return Array.from( designState.editRegistry.values() )
        .filter( edit => edit.edited )
        .map( edit => {
          if ( edit.operation === 'insertBefore' || edit.operation === 'insertAfter' ) {
            return {
              operation: edit.operation,
              anchorLocator: edit.anchorLocator,
              nearbyText: edit.anchorLocator && edit.anchorLocator.textExcerpt || '',
              prescribedText: edit.prescribedText
            };
          }

          if ( edit.operation === 'deleteText' ) {
            return {
              operation: 'deleteText',
              locator: edit.locator,
              beforeText: edit.beforeText
            };
          }

          return {
            operation: 'replaceText',
            locator: edit.locator,
            beforeText: edit.beforeText,
            prescribedText: edit.prescribedText
          };
        } );
    }

    /**
     * Gets all records that should be exported, including current state-description edits.
     *
     * @returns {Object[]}
     */
    function getPrescriptionRecordsForExport() {
      const records = [];

      const stateDescriptionRecord = createStateDescriptionPrescriptionRecord();
      if ( stateDescriptionRecord &&
           ( stateDescriptionRecord.prescriptions.length > 0 || stateDescriptionRecord.formattedViewEdit ) ) {
        records.push( stateDescriptionRecord );
      }

      records.push( ...designState.responseDesigns.map( design => design.record ) );
      return records;
    }

    /**
     * Downloads all current records as line-delimited JSON.
     */
    function downloadDesignSessionJSONL() {
      const records = getPrescriptionRecordsForExport();
      const jsonl = records.map( record => JSON.stringify( record ) ).join( '\n' );
      const blob = new Blob( [ jsonl ? `${jsonl}\n` : '' ], { type: 'application/jsonl' } );
      const url = URL.createObjectURL( blob );
      const link = document.createElement( 'a' );
      link.href = url;
      link.download = `description-design-${new Date().toISOString().replace( /[:.]/g, '-' )}.jsonl`;
      document.body.appendChild( link );
      link.click();
      document.body.removeChild( link );
      URL.revokeObjectURL( url );
    }

    /**
     * Downloads a Markdown prompt suitable for Codex or codex exec.
     */
    function downloadCodexPrompt() {
      const prompt = createCodexPrompt();
      const blob = new Blob( [ prompt ], { type: 'text/markdown' } );
      const url = URL.createObjectURL( blob );
      const link = document.createElement( 'a' );
      link.href = url;
      link.download = `description-prescriptions-codex-${new Date().toISOString().replace( /[:.]/g, '-' )}.md`;
      document.body.appendChild( link );
      link.click();
      document.body.removeChild( link );
      URL.revokeObjectURL( url );
    }

    /**
     * Creates a compact Codex implementation prompt from all captured prescriptions.
     *
     * @returns {string}
     */
    function createCodexPrompt() {
      const records = getPrescriptionRecordsForExport();
      const simMetadata = getSimMetadata();
      const counts = getPromptPrescriptionCounts();
      const lines = [
        `Implement these accessibility description prescriptions in ${simMetadata.repo || 'the current sim'}.`,
        '',
        `Prescription summary: ${counts.stateDescriptionAdditions} state-description additions, ${counts.stateDescriptionReplacements} replacements, ${counts.stateDescriptionDeletions} deletions, ${counts.responsePrescriptions} response prescriptions.`,
        '',
        'Constraints:',
        '- Preserve existing PhET i18n/string patterns.',
        '- Add or update strings in the appropriate sim strings file.',
        '- Use existing describer, Core Description, and accessible response patterns.',
        '- For formatted view edits, treat the edited rendered text and diff as the designer prescription for state descriptions.',
        '- Treat accessible view state as the semantic comparison artifact for designing responses; Axon Properties and interaction listeners should still own live implementation triggers.',
        '- For new accessible-state contracts, prefer component objects shaped like { visible: false } or { visible: true, ...screenReaderRelevantSemanticFields }.',
        '- For context responses, prefer component accessibleContextResponse options when available; use addAccessibleContextResponse at the interaction point for custom interactions, and dedicated describer/transition classes only for complex state comparisons.',
        '- Run ./bin/check --fix --skip-phet-io-compare-api.',
        '- Generalize beyond what is provided -- across screens, across scenes, and across parameters. The designer probably specified one data point; implement the reusable intent.',
        '- State deltas can be noisy. Implement the designer\'s intent, not every incidental state delta.',
        '- Ignore the directional markers ‪ and ‬ or <0x202a> or <0x202c>, they will be added automatically downstream.',
        '',
        'Prescriptions:'
      ];

      records.forEach( ( record, recordIndex ) => {
        lines.push( '', `${recordIndex + 1}. ${formatRecordHeading( record )}` );

        if ( record.type === 'stateDescriptionPrescriptions' ) {
          if ( record.formattedViewEdit ) {
            lines.push( '   Formatted view edit:' );
            lines.push( '      Original rendered text:' );
            lines.push( `      ${record.formattedViewEdit.beforeText.replace( /\n/g, '\n      ' )}` );
            lines.push( '      Edited rendered text:' );
            lines.push( `      ${record.formattedViewEdit.afterText.replace( /\n/g, '\n      ' )}` );
            lines.push( '      Diff:' );
            lines.push( `      ${JSON.stringify( record.formattedViewEdit.diff, null, 2 ).replace( /\n/g, '\n      ' )}` );
          }

          if ( record.prescriptions.length > 0 ) {
            record.prescriptions.forEach( ( prescription, prescriptionIndex ) => {
              lines.push( `   ${recordIndex + 1}.${prescriptionIndex + 1}. Operation: ${prescription.operation}` );
              appendPrescriptionLines( lines, prescription, '      ' );
            } );
          }
        }
        else if ( record.type === 'contextResponsePrescription' ) {
          lines.push( `   Operation: ${record.response.operation}` );
          lines.push( `   Category: ${record.response.category}` );
          if ( record.response.beforeText ) {
            lines.push( `   Current response: ${record.response.beforeText}` );
          }
          lines.push( `   Prescribed response: ${record.response.prescribedText}` );
          lines.push( '   State delta:' );
          lines.push( `      ${JSON.stringify( record.stateDelta, null, 2 ).replace( /\n/g, '\n      ' )}` );
        }
      } );

      return `${lines.join( '\n' )}\n`;
    }

    /**
     * Formats a record heading for the Codex prompt.
     *
     * @param {Object} record
     * @returns {string}
     */
    function formatRecordHeading( record ) {
      const sim = record.sim || {};
      const screen = sim.screenName ? `${sim.screenName} (${sim.screenIndex})` : `screen ${sim.screenIndex === null ? '?' : sim.screenIndex}`;
      return `${record.type} - ${sim.repo || 'unknown repo'} - ${screen}`;
    }

    /**
     * Appends Markdown lines for one state-description prescription.
     *
     * @param {string[]} lines
     * @param {Object} prescription
     * @param {string} indent
     */
    function appendPrescriptionLines( lines, prescription, indent ) {
      if ( prescription.locator ) {
        lines.push( `${indent}Locator: ${JSON.stringify( prescription.locator )}` );
      }
      if ( prescription.anchorLocator ) {
        lines.push( `${indent}Anchor locator: ${JSON.stringify( prescription.anchorLocator )}` );
      }
      if ( prescription.nearbyText ) {
        lines.push( `${indent}Nearby text: ${prescription.nearbyText}` );
      }
      if ( prescription.beforeText ) {
        lines.push( `${indent}Current text: ${prescription.beforeText}` );
      }
      if ( prescription.prescribedText ) {
        lines.push( `${indent}Prescribed text: ${prescription.prescribedText}` );
      }
    }

    /**
     * Observes the PDOM for changes and throttles re-rendering of the formatted DOM view.
     *
     * @param {HTMLElement} pdomRoot
     * @param {{ formatted: HTMLElement|null }} viewContainers
     * @param {MutationObserverInit} mutationConfig
     * @param {{ formatted: Function }} renderers
     * @param {HTMLElement|null} accessibleViewStateContainer
     * @returns {Function} Function that triggers a re-render on demand.
     */
    function addPDOMObserver( pdomRoot, viewContainers, mutationConfig, renderers, accessibleViewStateContainer ) {
      let dirty = true;
      let renderTimeoutId = null;
      const innerWindow = pdomRoot.ownerDocument.defaultView;

      const scheduleRender = () => {
        if ( renderTimeoutId !== null ) {
          return;
        }
        renderTimeoutId = setTimeout( () => {
          if ( !designState.isFrozen ) {
            renderViews( pdomRoot, viewContainers, renderers );
            renderAccessibleViewState( innerWindow, accessibleViewStateContainer );
            updateStaleEditSection();
          }
          dirty = false;
          renderTimeoutId = null;
        }, 10 );
      };

      setInterval( () => {
        if ( dirty ) {
          scheduleRender();
        }
      }, 300 );

      const domObserver = new MutationObserver( () => {
        dirty = true;
      } );

      domObserver.observe( pdomRoot, mutationConfig );
      scheduleRender();

      // Return a function that will trigger a re-render on demand.
      const invalidateView = () => {
        dirty = true;
      };

      // Some input changes do not trigger mutations, so listen for events explicitly.
      [ 'input', 'change' ].forEach( eventType => {
        pdomRoot.addEventListener( eventType, invalidateView );
      } );

      return invalidateView;
    }

    /**
     * Adds a mutation observer to mirror ARIA live region updates in the activity log UI.
     *
     * @param {HTMLElement} originalElement
     * @param {HTMLElement} listElement
     * @param {HTMLElement} alertContainer
     * @param {MutationObserverInit} mutationConfig
     */
    function addLiveObserver( originalElement, listElement, alertContainer, mutationConfig ) {
      if ( !originalElement || !listElement || !alertContainer ) {
        return;
      }
      const liveObserver = new MutationObserver( mutations => {
        mutations.forEach( mutation => {

          // Only display added DOM nodes. ariaLiveAnnouncer will remove the content from aria-live elements so that it
          // can't be read by the virtual cursor. This registers as a "mutation", but we don't want to display
          // the removal.
          if ( mutation.addedNodes.length > 0 ) {
            const alertText = mutation.target.textContent;
            const responseCategory = mutation.target.dataset && mutation.target.dataset.responseCategory ?
                                     mutation.target.dataset.responseCategory.toLowerCase() : 'other';
            const responseStyle = RESPONSE_TYPE_STYLES[ responseCategory ] || RESPONSE_TYPE_STYLES.other;

            // update the text content of the copied element to match the element in the iframe document
            // create a list item to add to the alert list
            if ( alertText.length > 0 ) {
              const responseMetadata = {
                timestamp: new Date().toISOString(),
                category: responseCategory,
                text: alertText
              };
              designState.recentResponses.push( responseMetadata );
              if ( designState.recentResponses.length > ACTIVITY_LOG_LENGTH ) {
                designState.recentResponses.shift();
              }

              const listItem = document.createElement( 'li' );
              listItem.style.opacity = 1.0;
              listItem.classList.add( 'alert-log-item', responseStyle.className );
              const badge = document.createElement( 'span' );
              badge.classList.add( 'alert-log-badge' );
              badge.textContent = responseStyle.badge;
              const message = document.createElement( 'span' );
              message.classList.add( 'alert-log-message' );
              message.textContent = alertText;
              listItem.appendChild( badge );
              listItem.appendChild( message );
              if ( mutation.target.id.includes( 'assertive' ) ) {
                listItem.classList.add( 'assertive' );
              }

              listElement.appendChild( listItem );

              // Auto-scroll to bottom to show the newest messages
              alertContainer.scrollTop = alertContainer.scrollHeight;

              // Remove the oldest items from the list if we are over the limit.
              const overflow = listElement.children.length - ACTIVITY_LOG_LENGTH;
              for ( let i = 0; i < overflow; i++ ) {

                // remove the first child, which is the oldest
                listElement.removeChild( listElement.firstChild );
              }

              if ( responseCategory === 'context' ) {
                captureContextResponseDesign( alertText, responseCategory );
              }

            }
          }
        } );
      } );

      liveObserver.observe( originalElement, mutationConfig );
    }

    /**
     * Captures a context response design with the latest pre-interaction snapshot and a delayed after snapshot.
     *
     * @param {string} responseText
     * @param {string} category
     */
    function captureContextResponseDesign( responseText, category ) {
      if ( !designState.designModeEnabled ) {
        return;
      }

      const beforeSnapshot = Date.now() - designState.lastPreInteractionTimestamp <= PRE_INTERACTION_SNAPSHOT_MAX_AGE ?
                             designState.lastPreInteractionSnapshot :
                             null;

      setTimeout( () => {
        const afterSnapshot = captureDesignSnapshot();
        if ( !afterSnapshot ) {
          return;
        }

        const record = createContextResponsePrescriptionRecord( beforeSnapshot, afterSnapshot, responseText, category, 'replaceResponse', responseText );
        const design = {
          id: `response-design-${designState.responseDesigns.length + 1}`,
          record: record,
          edited: false
        };
        designState.responseDesigns.push( design );
        renderResponseDesignItem( design );
        console.log( JSON.stringify( record ) );
        updatePromptStatus();
      }, RESPONSE_AFTER_SNAPSHOT_DELAY );
    }

    /**
     * Renders one editable response design record.
     *
     * @param {{ id: string, record: Object, edited: boolean }} design
     */
    function renderResponseDesignItem( design ) {
      const list = domReferences.responseDesignList;
      if ( !list ) {
        return;
      }

      const item = document.createElement( 'div' );
      item.className = 'response-design-item';

      const meta = document.createElement( 'span' );
      meta.className = 'response-design-meta';
      meta.textContent = `${design.record.timestamp} ${design.record.sim.repo || ''} screen ${design.record.sim.screenIndex === null ? '?' : design.record.sim.screenIndex}`;
      item.appendChild( meta );

      const editable = document.createElement( 'span' );
      editable.className = 'response-design-editable';
      editable.contentEditable = designState.designModeEnabled ? 'true' : 'false';
      editable.textContent = design.record.response.prescribedText;
      editable.addEventListener( 'focus', () => {
        if ( !designState.designModeEnabled ) {
          return;
        }
        design.edited = true;
        editable.classList.add( 'design-edited' );
      } );
      editable.addEventListener( 'input', () => {
        if ( !designState.designModeEnabled ) {
          return;
        }
        design.edited = true;
        editable.classList.add( 'design-edited' );
        design.record.response.prescribedText = editable.textContent || '';
        updatePromptStatus();
      } );
      item.appendChild( editable );

      const actions = document.createElement( 'div' );
      actions.className = 'response-design-actions';
      const logButton = document.createElement( 'button' );
      logButton.type = 'button';
      logButton.textContent = 'Log JSON';
      logButton.addEventListener( 'click', () => console.log( JSON.stringify( design.record ) ) );
      actions.appendChild( logButton );
      item.appendChild( actions );

      list.appendChild( item );
    }

    /**
     * Installs listeners that capture the state before likely interactions that can trigger context responses.
     *
     * @param {Document} iframeDocument
     */
    function installPreInteractionSnapshotListeners( iframeDocument ) {
      const captureBeforeInteraction = () => {
        if ( !designState.designModeEnabled ) {
          return;
        }

        const snapshot = captureDesignSnapshot();
        if ( snapshot ) {
          designState.lastPreInteractionSnapshot = snapshot;
          designState.lastPreInteractionTimestamp = Date.now();
        }
      };

      [ 'pointerdown', 'keydown', 'input', 'change' ].forEach( eventType => {
        iframeDocument.addEventListener( eventType, captureBeforeInteraction, true );
      } );
    }

    /**
     * Removes all alerts from the activity log container.
     *
     * @param {HTMLElement} listElement
     */
    function clearActivityLog( listElement ) {
      while ( listElement.firstChild ) {
        listElement.removeChild( listElement.lastChild );
      }
    }

    /**
     * Sets up the activity log clear button to remove all logged alerts on click.
     *
     * @param {HTMLElement|null} button
     * @param {HTMLElement|null} listElement
     */
    function initializeActivityLogButton( button, listElement ) {
      if ( !button || !listElement ) {
        return;
      }
      button.addEventListener( 'click', () => clearActivityLog( listElement ) );
    }

    /**
     * Subscribes to iframe load events, wiring DOM observers and view renderers once the sim is ready.
     *
     * @param {{ iframe: HTMLIFrameElement|null, alertList: HTMLElement|null, alertContainer: HTMLElement|null, clearActivityLogButton: HTMLElement|null, domCopyContainer: HTMLElement|null, accessibleViewStateCode: HTMLElement|null }} domRefs
     * @param {{ formatted: HTMLElement|null }} viewContainers
     * @param {{ formatted: Function }} renderers
     * @param {MutationObserverInit} mutationConfig
     */
    function setupMessageListener( domRefs, viewContainers, renderers, mutationConfig ) {
      if ( !domRefs || !domRefs.iframe ) {
        return;
      }

      window.addEventListener( 'message', event => {
        if ( !event.data ) {
          return;
        }

        let data;
        try {
          data = JSON.parse( event.data );
        }
        catch( e ) {
          return;
        }

        if ( data.type !== 'load' ) {
          return;
        }

        const innerWindow = domRefs.iframe.contentWindow;
        if ( !innerWindow ) {
          return;
        }

        // eslint-disable-next-line dot-notation
        const phetNamespace = innerWindow[ 'phet' ];
        if ( !phetNamespace || !phetNamespace.joist || !phetNamespace.joist.display ) {
          return;
        }

        const PDOMRoot = phetNamespace.joist.display.pdomRootElement;
        if ( !PDOMRoot ) {
          return;
        }
        designState.isFrozen = false;
        designState.frozenPDOMRoot = null;
        designState.frozenSnapshot = null;
        designState.liveFormattedDocument = null;
        if ( designState.formattedDocumentDraft ) {
          designState.formattedDocumentDraft.active = false;
        }
        designState.pdomRoot = PDOMRoot;
        designState.innerWindow = innerWindow;
        updateFreezeControls();

        const ariaLiveElementsContainer = phetNamespace.joist.sim.display.descriptionUtteranceQueue.announcer.ariaLiveContainer;
        const globalContainer = phetNamespace.scenery.globalDescriptionQueue.announcer.ariaLiveContainer;

        const simDisplayElements = Array.prototype.slice.call( ariaLiveElementsContainer.children );
        const globalElements = Array.prototype.slice.call( globalContainer.children );
        const allSourceAriaLiveElements = [ ...simDisplayElements, ...globalElements ];

        const invalidateView = addPDOMObserver( PDOMRoot, viewContainers, mutationConfig, renderers, domRefs.accessibleViewStateCode );

        const selectedScreenProperty = phetNamespace.joist.sim.selectedScreenProperty;
        if ( selectedScreenProperty && typeof selectedScreenProperty.link === 'function' ) {
          selectedScreenProperty.link( invalidateView );
        }
        const homeSelectedScreenProperty = phetNamespace.joist.sim.homeScreen &&
                                           phetNamespace.joist.sim.homeScreen.model &&
                                           phetNamespace.joist.sim.homeScreen.model.selectedScreenProperty;
        if ( homeSelectedScreenProperty && typeof homeSelectedScreenProperty.link === 'function' ) {
          homeSelectedScreenProperty.link( invalidateView );
        }

        // HACK ALERT! When checkboxes become checked, they only set the checked attribute, which does not trigger a
        // mutation or input event. Therefore, we need to monkey-patch the checked property setter to notify us when it
        // changes so we can invalidate the formatted view and re-render immediately.
        // Note that this apparently doesn't work for keyboard input because with keyboard input, the checked
        // attribute is updated in browser-native code. So we need this code for mouse input and the input/change
        // listeners in addPDOMObserver for keyboard input.
        const frameWindow = PDOMRoot.ownerDocument.defaultView;
        if ( frameWindow && !frameWindow.__a11yViewCheckedPatched ) {

          // Grab the original getter/setter for HTMLInputElement.checked inside the iframe.
          const descriptor = Object.getOwnPropertyDescriptor( frameWindow.HTMLInputElement.prototype, 'checked' );
          if ( descriptor && descriptor.set && descriptor.get ) {
            const originalGet = descriptor.get;
            const originalSet = descriptor.set;

            Object.defineProperty( frameWindow.HTMLInputElement.prototype, 'checked', {
              configurable: descriptor.configurable,
              enumerable: descriptor.enumerable,
              get: originalGet,
              set( value ) {

                // Snapshot the current property value before delegating to the native setter.
                const previous = originalGet.call( this );

                // Let the browser perform the original state change.
                originalSet.call( this, value );

                // When the value actually flips, notify the formatted view so it can re-render immediately.
                if ( previous !== value ) {
                  invalidateView();
                }
              }
            } );

            // Remember that we’ve already patched this iframe so we don’t redefine the property on subsequent loads.
            frameWindow.__a11yViewCheckedPatched = true;
          }
        }

        if ( domRefs.alertList && domRefs.alertContainer ) {
          for ( let i = 0; i < allSourceAriaLiveElements.length; i++ ) {
            addLiveObserver( allSourceAriaLiveElements[ i ], domRefs.alertList, domRefs.alertContainer, mutationConfig );
          }
        }

        const iframeDocument = domRefs.iframe.contentWindow.document;

        domRefs.iframe.focus();
        installPreInteractionSnapshotListeners( iframeDocument );

        let previousElement = null;
        const handleIframeFocus = () => {
          if ( previousElement ) {
            previousElement.classList.remove( 'highlight' );
          }
          const activeElement = iframeDocument.activeElement;
          previousElement = activeElement;
          const isDocumentBody = activeElement === iframeDocument.body;
          if ( activeElement && !isDocumentBody && typeof activeElement.classList !== 'undefined' ) {
            activeElement.classList.add( 'highlight' );
          }
        };

        iframeDocument.addEventListener( 'focusin', handleIframeFocus );
        handleIframeFocus();
      } );
    }

    /**
     * Collects frequently accessed DOM nodes for later use.
     *
     * @returns {{ iframe: HTMLIFrameElement|null, alertList: HTMLElement|null, alertContainer: HTMLElement|null, clearActivityLogButton: HTMLElement|null, domCopyContainer: HTMLElement|null, accessibleViewStateCode: HTMLElement|null, splitLayout: HTMLElement|null, splitPanes: HTMLElement[], splitResizers: HTMLElement[], designModeCheckbox: HTMLInputElement|null, freezeDesignButton: HTMLElement|null, freezeStatus: HTMLElement|null, promptStatus: HTMLElement|null, clearPromptButton: HTMLElement|null, downloadJsonlButton: HTMLElement|null, downloadCodexPromptButton: HTMLElement|null, staleEditsContainer: HTMLElement|null, staleEditsList: HTMLElement|null, responseDesignsContainer: HTMLElement|null, responseDesignList: HTMLElement|null, manualContextBeforeButton: HTMLElement|null, manualContextAfterButton: HTMLElement|null, manualContextAddButton: HTMLElement|null, manualContextResponseInput: HTMLTextAreaElement|null, manualContextResponseStatus: HTMLElement|null }}
     */
    function createDomReferences() {
      return {
        iframe: document.getElementById( 'iframe' ),
        alertList: document.getElementById( 'alert-list' ),
        alertContainer: document.getElementById( 'polite-element-container' ),
        clearActivityLogButton: document.getElementById( 'clear-activity-log-button' ),
        domCopyContainer: document.getElementById( 'dom-copy-container' ),
        accessibleViewStateCode: document.getElementById( 'accessible-view-state-code' ),
        splitLayout: document.getElementById( 'split-layout' ),
        splitPanes: Array.from( document.querySelectorAll( '.split-pane' ) ),
        splitResizers: Array.from( document.querySelectorAll( '.split-resizer' ) ),
        designModeCheckbox: document.getElementById( 'design-mode-checkbox' ),
        freezeDesignButton: document.getElementById( 'freeze-design-button' ),
        freezeStatus: document.getElementById( 'freeze-status' ),
        promptStatus: document.getElementById( 'prompt-status' ),
        clearPromptButton: document.getElementById( 'clear-prompt-button' ),
        downloadJsonlButton: document.getElementById( 'download-jsonl-button' ),
        downloadCodexPromptButton: document.getElementById( 'download-codex-prompt-button' ),
        staleEditsContainer: document.getElementById( 'stale-edits-container' ),
        staleEditsList: document.getElementById( 'stale-edits-list' ),
        responseDesignsContainer: document.getElementById( 'response-designs-container' ),
        responseDesignList: document.getElementById( 'response-design-list' ),
        manualContextBeforeButton: document.getElementById( 'manual-context-before-button' ),
        manualContextAfterButton: document.getElementById( 'manual-context-after-button' ),
        manualContextAddButton: document.getElementById( 'manual-context-add-button' ),
        manualContextResponseInput: document.getElementById( 'manual-context-response-input' ),
        manualContextResponseStatus: document.getElementById( 'manual-context-response-status' )
      };
    }

    /**
     * Resolves the specific DOM view containers under the provided root element.
     *
     * @param {HTMLElement|null} root
     * @returns {{ formatted: HTMLElement|null }}
     */
    function createViewContainers( root ) {
      if ( !root ) {
        return {
          formatted: null
        };
      }

      return {
        formatted: root.querySelector( '[data-view="formatted"]' )
      };
    }

    /**
     * Enables live-reload updates for local development when the query parameter is present.
     */
    function initializeLiveReload() {
      const query = new URLSearchParams( window.location.search );
      if ( !query.has( 'liveReload' ) ) {
        return;
      }
      new EventSource( '/esbuild' ).addEventListener( 'change', () => location.reload() );
    }

  } )();
</script>
